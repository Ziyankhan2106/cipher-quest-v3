<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CipherQuest | Level 1.5 | Fixed Number Encoding</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
:root {
  --bg:     #05080f;
  --panel:  rgba(12,18,34,0.92);
  --border: rgba(148,163,184,0.34);
  --green:  #22c55e;
  --cyan:   #59f2ff;
  --yellow: #ffdd57;
  --purple: #b97fff;
  --orange: #ff9f43;
  --muted:  #4a607a;
  --text:   #cde0f5;
  --mono:   'Share Tech Mono', monospace;
  --sans:   'Rajdhani', system-ui, sans-serif;
  /* group colors */
  --col-digit:  #59f2ff;
  --col-lower:  #b97fff;
  --col-upper:  #ffdd57;
  --col-sym:    #ff9f43;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);font-family:var(--sans);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;overflow-x:hidden;cursor:url('/assets/mouse.png') 4 4,auto;
}

/* Global cursor enforcement */
*{cursor:inherit!important;}
a,button,[role="button"],input,textarea,select{cursor:url('/assets/mouse.png') 4 4,pointer!important;}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 55% 35% at 15% 10%,rgba(34,211,110,0.06) 0%,transparent 70%),
    radial-gradient(ellipse 40% 40% at 85% 85%,rgba(89,242,255,0.04) 0%,transparent 70%);
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(34,211,110,0.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(34,211,110,0.018) 1px,transparent 1px);
  background-size:44px 44px;
}

/* ── Card ── */
.card{
  position:relative;z-index:1;width:100%;max-width:780px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:18px;backdrop-filter:blur(20px);
  box-shadow:0 0 0 1px rgba(34,211,110,0.04),0 40px 100px rgba(0,0,0,0.85);
  overflow:hidden;
}

/* ── Topbar ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;background:rgba(5,8,15,0.7);
  border-bottom:1px solid rgba(34,211,110,0.18);
}
.topbar-left{display:flex;align-items:center;gap:10px;}
.badge{
  font-family:var(--mono);font-size:10px;letter-spacing:.2em;
  padding:3px 10px;border-radius:4px;
  border:1px solid rgba(34,211,110,0.5);
  color:var(--green);background:rgba(34,211,110,0.07);
}
.topbar-title{font-family:'SF Mono','Fira Code',Consolas,monospace;font-size:22px;font-weight:800;text-transform:uppercase;letter-spacing:0.15em;}
.topbar-sub{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.15em;}
.live{
  display:flex;align-items:center;gap:6px;
  font-family:var(--mono);font-size:11px;color:var(--green);
  letter-spacing:.16em;text-transform:uppercase;
}
.live::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:var(--green);box-shadow:0 0 10px var(--green);
  animation:pulse 1.4s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Controls ── */
.controls{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:10px 20px;
  border-bottom:1px solid rgba(34,211,110,0.08);
  background:rgba(5,8,15,0.4);
}
.ctrl-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.18em;}
.word-input{
  font-family:var(--mono);font-size:13px;font-weight:700;
  background:rgba(5,8,15,0.8);
  border:1px solid rgba(34,211,110,0.28);
  border-radius:8px;padding:6px 12px;color:var(--green);
  letter-spacing:.14em;outline:none;width:180px;
  transition:border-color .2s,box-shadow .2s;
}
.word-input:focus{border-color:rgba(34,211,110,.6);box-shadow:0 0 12px rgba(34,211,110,.15);}
.go-btn{
  margin-left:auto;padding:7px 22px;border-radius:999px;
  border:none;background:var(--green);color:#05080f;
  font-family:var(--sans);font-size:11px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;
  cursor:pointer;transition:all .2s;
}
.go-btn:hover{box-shadow:0 0 22px rgba(34,211,110,.55);background:#4fffa0;}
.go-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── Stage ── */
.stage{
  padding:18px 18px 16px;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  position:relative;min-height:520px;
}
.stage::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,transparent 0,transparent 3px,
    rgba(34,211,110,0.008) 3px,rgba(34,211,110,0.008) 4px
  );
}

/* ── Status ── */
.status{
  font-family:var(--mono);font-size:11px;color:var(--green);
  letter-spacing:.18em;min-height:18px;
  align-self:flex-start;position:relative;z-index:2;
}
.blink{animation:blink .9s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── Conveyor belt ── */
.belt-section{
  position:relative;z-index:2;width:100%;
  opacity:0;transition:opacity .4s;
}
.belt-section.vis{opacity:1;}
.belt-label{
  font-family:var(--mono);font-size:9px;color:var(--muted);
  letter-spacing:.18em;margin-bottom:6px;
  display:flex;align-items:center;justify-content:space-between;
}
.belt-track{
  background:rgba(5,8,15,0.8);
  border:1px solid rgba(34,211,110,0.15);
  border-radius:10px;padding:8px 10px;
  display:flex;align-items:center;gap:0;
  position:relative;overflow:hidden;
}
/* Moving belt line */
.belt-track::before{
  content:'';
  position:absolute;bottom:0;left:0;right:0;height:3px;
  background:repeating-linear-gradient(
    90deg,
    rgba(34,211,110,0.25) 0px,rgba(34,211,110,0.25) 12px,
    transparent 12px,transparent 20px
  );
  animation:beltMove 1.2s linear infinite;
}
@keyframes beltMove{from{background-position:0 0}to{background-position:32px 0}}

.pkg-list{display:flex;gap:8px;align-items:center;}
.pkg{
  width:48px;height:52px;border-radius:8px;
  border:1px solid rgba(34,211,110,0.2);
  background:rgba(5,8,15,0.7);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;
  font-family:var(--mono);font-size:19px;font-weight:700;color:var(--text);
  opacity:0;transition:all .3s;position:relative;overflow:hidden;
  flex-shrink:0;
}
.pkg .pidx{font-size:8px;color:var(--muted);}
.pkg.loaded{opacity:1;}
.pkg.active{
  border-color:var(--yellow);color:var(--yellow);
  box-shadow:0 0 20px rgba(255,229,102,.45),inset 0 0 10px rgba(255,229,102,.06);
}
.pkg.active::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 40%,rgba(255,229,102,.1) 60%,transparent 80%);
  animation:shimmer 1s linear infinite;
}
@keyframes shimmer{from{transform:translateX(-120%)}to{transform:translateX(200%)}};
.pkg.done{border-color:rgba(34,211,110,.35);color:rgba(34,211,110,.6);}

/* Arrow on belt */
.belt-arrow{
  font-family:var(--mono);font-size:11px;color:rgba(34,211,110,.4);
  margin:0 4px;flex-shrink:0;
}

/* ── Drop package animation overlay ── */
.drop-pkg{
  position:fixed;
  width:44px;height:44px;border-radius:8px;
  border:2px solid var(--yellow);
  background:rgba(5,8,15,0.9);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:18px;font-weight:700;color:var(--yellow);
  box-shadow:0 0 18px rgba(255,229,102,.7);
  pointer-events:none;z-index:100;
  transition:none;
}

/* ── Locker banks ── */
.banks-wrap{
  position:relative;z-index:2;width:100%;
  opacity:0;transition:opacity .5s;
}
.banks-wrap.vis{opacity:1;}
.banks-label{
  font-family:var(--mono);font-size:9px;color:var(--muted);
  letter-spacing:.18em;margin-bottom:8px;
}
.banks-row{
  display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;
}

.bank{
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.07);
  background:rgba(5,8,15,0.65);
  overflow:hidden;
  transition:border-color .3s,box-shadow .3s;
}
.bank.digit-bank  { --bcol: var(--col-digit); }
.bank.lower-bank  { --bcol: var(--col-lower); }
.bank.upper-bank  { --bcol: var(--col-upper); }
.bank.sym-bank    { --bcol: var(--col-sym);   }

.bank.bank-glow{
  border-color:var(--bcol);
  box-shadow:0 0 20px rgba(0,0,0,0) /* overridden by JS */;
}
.bank-header{
  padding:6px 8px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  background:rgba(5,8,15,0.5);
}
.bank-name{
  font-family:var(--mono);font-size:9px;letter-spacing:.16em;
  color:var(--muted);text-transform:uppercase;
}
.bank-range{
  font-family:var(--mono);font-size:8px;color:rgba(74,96,122,0.7);
  margin-top:1px;
}
.bank.bank-glow .bank-name{color:var(--bcol);}
.bank.bank-glow .bank-range{color:rgba(255,255,255,0.4);}

.lockers-grid{
  padding:6px;
  display:grid;gap:3px;
}
.digit-bank  .lockers-grid{grid-template-columns:repeat(5,1fr);}
.lower-bank  .lockers-grid{grid-template-columns:repeat(5,1fr);}
.upper-bank  .lockers-grid{grid-template-columns:repeat(5,1fr);}
.sym-bank    .lockers-grid{grid-template-columns:repeat(4,1fr);}

.locker{
  border-radius:5px;
  border:1px solid rgba(255,255,255,0.06);
  background:rgba(5,8,15,0.5);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:4px 2px;gap:1px;
  transition:all .25s;
  cursor:default;
}
.locker .lk-ch{
  font-family:var(--mono);font-size:10px;font-weight:700;
  color:var(--muted);transition:color .25s;
}
.locker .lk-num{
  font-family:var(--mono);font-size:8px;
  color:rgba(74,96,122,0.5);transition:color .25s;
}
.locker.lk-scan{
  border-color:rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.04);
}
.locker.lk-scan .lk-ch{color:var(--text);}
.locker.lk-scan .lk-num{color:var(--muted);}

.locker.lk-open{
  border-color:var(--bcol,var(--green));
  background:rgba(0,0,0,0); /* override below */
  box-shadow:0 0 10px var(--bcol,var(--green));
  animation:lockerPop .4s cubic-bezier(.34,1.56,.64,1);
}
.bank.digit-bank .locker.lk-open{ background:rgba(89,242,255,0.12); border-color:var(--col-digit); }
.bank.lower-bank .locker.lk-open{ background:rgba(185,127,255,0.12); border-color:var(--col-lower); }
.bank.upper-bank .locker.lk-open{ background:rgba(255,229,102,0.12); border-color:var(--col-upper); }
.bank.sym-bank   .locker.lk-open{ background:rgba(255,159,67,0.12);  border-color:var(--col-sym);   }

.bank.digit-bank .locker.lk-open .lk-ch{ color:var(--col-digit); }
.bank.lower-bank .locker.lk-open .lk-ch{ color:var(--col-lower); }
.bank.upper-bank .locker.lk-open .lk-ch{ color:var(--col-upper); }
.bank.sym-bank   .locker.lk-open .lk-ch{ color:var(--col-sym);   }

.bank.digit-bank .locker.lk-open .lk-num{ color:var(--col-digit); font-weight:700; }
.bank.lower-bank .locker.lk-open .lk-num{ color:var(--col-lower); font-weight:700; }
.bank.upper-bank .locker.lk-open .lk-num{ color:var(--col-upper); font-weight:700; }
.bank.sym-bank   .locker.lk-open .lk-num{ color:var(--col-sym);   font-weight:700; }

@keyframes lockerPop{
  0%{transform:scale(1)}
  40%{transform:scale(1.25)}
  70%{transform:scale(0.95)}
  100%{transform:scale(1)}
}

/* The number ejecting from locker */
.ejected-num{
  position:fixed;
  font-family:var(--mono);font-size:15px;font-weight:700;
  padding:5px 10px;border-radius:7px;
  pointer-events:none;z-index:100;
  opacity:0;
}

/* ── Output row ── */
.output-wrap{
  position:relative;z-index:2;width:100%;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.out-label{
  font-family:var(--mono);font-size:9px;color:var(--muted);
  letter-spacing:.18em;align-self:flex-start;
  opacity:0;transition:opacity .3s;
}
.out-label.vis{opacity:1;}
.out-chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.oc{
  min-width:52px;height:52px;border-radius:8px;padding:0 8px;
  border:1px solid rgba(34,211,110,0.08);
  background:rgba(5,8,15,0.5);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;
  color:transparent;transition:all .4s;
}
.oc .onumval{font-family:var(--mono);font-size:16px;font-weight:700;}
.oc .ochidx{font-family:var(--mono);font-size:8px;color:var(--muted);}
.oc .ochara{font-family:var(--mono);font-size:8px;color:var(--muted);}
.oc.landed{
  color:var(--green);
  border-color:rgba(34,211,110,.5);
  box-shadow:0 0 18px rgba(34,211,110,.3);
  animation:landIn .5s cubic-bezier(.34,1.56,.64,1);
}
.oc.landed .ochidx,.oc.landed .ochara{color:rgba(34,211,110,.5);}
@keyframes landIn{from{transform:scale(.7) translateY(-8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}

/* ── Info panel ── */
.info-panel{
  position:relative;z-index:2;width:100%;
  background:rgba(5,8,15,0.6);
  border:1px solid rgba(34,211,110,0.14);
  border-radius:12px;padding:14px 18px;
  opacity:0;transform:translateY(8px);
  transition:opacity .5s,transform .5s;
}
.info-panel.vis{opacity:1;transform:translateY(0);}
.info-title{
  font-family:var(--mono);font-size:9px;color:var(--green);
  letter-spacing:.22em;margin-bottom:10px;
}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.irow{
  background:rgba(5,8,15,0.5);
  border:1px solid rgba(34,211,110,0.08);
  border-radius:8px;padding:10px 12px;
}
.irow-lbl{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:.18em;margin-bottom:4px;}
.irow-val{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.06em;}
.formula{
  grid-column:1/-1;
  font-family:var(--mono);font-size:11px;color:var(--text);line-height:1.8;
  background:rgba(5,8,15,0.8);
  border:1px solid rgba(34,211,110,0.12);
  border-radius:8px;padding:12px 14px;
}
.formula em{color:var(--cyan);font-style:normal;}
.formula strong{color:var(--yellow);}
.formula .gr{color:var(--green);}

/* ── Footer ── */
.footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;
  border-top:1px solid rgba(148,163,184,0.34);
  background:rgba(2,6,23,0.74);
}
.foot-btn{
  font-family:var(--sans);font-size:11px;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;
  padding:7px 16px;border-radius:999px;
  border:1px solid rgba(34,211,110,0.25);
  background:transparent;color:var(--muted);
  cursor:pointer;transition:all .2s;
}
.foot-btn:hover{color:var(--text);border-color:rgba(34,211,110,.5);}
.foot-btn.primary{color:var(--green);background:rgba(34,211,110,0.06);border-color:rgba(34,211,110,.4);}
.foot-btn.primary:hover{background:rgba(34,211,110,0.12);box-shadow:0 0 14px rgba(34,211,110,.28);}

        #speedDown,
        #speedUp {
            width: 28px;
            height: 26px;
            display: inline-grid;
            place-items: center;
            padding: 0;
            border: 1px solid rgba(89, 242, 255, 0.36);
            border-radius: 999px;
            background: rgba(89, 242, 255, 0.08);
            color: #59f2ff;
            font-size: 14px;
            font-weight: 900;
            line-height: 1;
            cursor: pointer;
            transition: background .18s ease, box-shadow .18s ease, transform .18s ease;
        }

        #speedDown:hover,
        #speedUp:hover {
            background: rgba(89, 242, 255, 0.16);
            box-shadow: 0 0 14px rgba(89, 242, 255, 0.24);
            transform: translateY(-1px);
        }

        #speedDisplay {
            min-width: 44px;
            color: #dffbff;
            font-variant-numeric: tabular-nums;
            text-align: center;
            font-family: "SF Mono", "Fira Code", Consolas, monospace;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .08em;
        }

        #btn-play,
        #btn-step,
        #btn-next,
        #replay,
        #replayBtn,
        #replayNow,
        #nextBtn,
        .btn,
        .foot-btn {
            min-height: 34px;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: .1em;
            font-size: 11px;
            font-weight: 800;
        }

        #btn-play,
        #replay,
        #replayBtn,
        #replayNow {
            border: 1px solid rgba(89, 242, 255, 0.46);
            background: rgba(89, 242, 255, 0.10);
            color: #59f2ff;
        }

        #btn-next,
        #btn-step,
        #nextBtn,
        .foot-btn.primary {
            border: 1px solid rgba(255, 221, 87, 0.46);
            background: rgba(255, 221, 87, 0.10);
            color: #ffdd57;
        }

        #btn-play:hover,
        #btn-step:hover,
        #btn-next:hover,
        #replay:hover,
        #replayBtn:hover,
        #replayNow:hover,
        #nextBtn:hover {
            box-shadow: 0 0 16px rgba(89, 242, 255, 0.22);
        }

    
        .step-btn {
            background: #59f2ff !important;
            color: #000 !important;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px) !important;
            border: none !important;
            border-radius: 0 !important;
            font-weight: 800 !important;
        }
        .step-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed !important;
        }
        .next-cipher-btn {
            background: #ffdd57 !important;
            color: #000 !important;
            border: none !important;
            font-weight: 800 !important;
        }

    
    
    /* -- PERFECTED BUTTON STYLES -- */
    .foot-btn, .step-btn, .next-cipher-btn, .go-btn, #goBtn, #replayBtn, #btn-next, #prevStep, #nextStep, #startBtn, #nextBtn {
        padding: 8px 16px !important;
        border-radius: 8px !important;
        font-size: 12px !important;
        font-weight: 700 !important;
        text-transform: uppercase !important;
        letter-spacing: 0.1em !important;
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 8px !important;
        clip-path: none !important;
        min-height: auto !important;
        box-sizing: border-box !important;
        cursor: pointer;
        transition: all 0.2s ease !important;
        font-family: inherit !important;
    }

    /* NEXT STEP & PREV STEP */
    #prevStep, #nextStep, .step-btn:not(#goBtn):not(#startBtn):not(.go-btn) {
        background: #59f2ff !important;
        color: #000 !important;
        border: 1px solid #59f2ff !important;
        opacity: 1 !important;
    }

    #prevStep:disabled, #nextStep:disabled, .step-btn:disabled {
        background: rgba(89, 242, 255, 0.4) !important;
        color: rgba(0, 0, 0, 0.7) !important;
        border: 1px solid transparent !important;
        cursor: not-allowed !important;
        box-shadow: none !important;
    }

    #prevStep:hover:not(:disabled), #nextStep:hover:not(:disabled), .step-btn:hover:not(:disabled) {
        box-shadow: 0 0 14px rgba(89, 242, 255, 0.4) !important;
    }

    /* RESTART & START */
    #replayBtn, #goBtn, #startBtn, .go-btn, #replay, #replayNow {
        background: #1e293b !important;
        color: #cbd5e1 !important;
        border: 1px solid #334155 !important;
    }
    
    #replayBtn:hover:not(:disabled), #goBtn:hover:not(:disabled), #startBtn:hover:not(:disabled), .go-btn:hover:not(:disabled), #replay:hover:not(:disabled), #replayNow:hover:not(:disabled) {
        background: #334155 !important;
        color: #f1f5f9 !important;
    }

    /* NEXT CIPHER */
    #btn-next, .next-cipher-btn, #nextBtn {
        background: #ffdd57 !important;
        color: #000 !important;
        border: 1px solid #ffdd57 !important;
    }
    #btn-next:hover, .next-cipher-btn:hover, #nextBtn:hover {
        box-shadow: 0 0 16px rgba(255, 221, 87, 0.5) !important;
    }

    </style>
    <script src="global_controls.js"></script>
</head>
<body>
<div class="card" id="mainCard">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="badge">CH 01</span>
      <div>
        <div class="topbar-title">Fixed Number Encoding</div>
        <div class="topbar-sub">Level 5 - EVERY CHARACTER HAS A LOCKER NUMBER</div>
      </div>
    </div>
    <div class="live">Auto Demo</div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <span class="ctrl-label" style="display:none;">WORD</span>
    <input class="word-input" id="wordInput" type="hidden" value="CIPHER" />
  </div>

  <!-- STAGE -->
  <div class="stage" id="stage">
    <div class="status"><span id="statusTxt">Ready — type anything, even symbols!</span><span class="blink"> ▌</span></div>

    <!-- Input chips -->
    <div class="pkg-list" id="pkgList" style="z-index: 2; margin-bottom: 14px;"></div>

    <!-- Locker banks -->
    <div class="banks-wrap" id="banksWrap">
      <div class="banks-label">↓ 4 LOCKER BANKS — each character has ONE fixed locker</div>
      <div class="banks-row" id="banksRow"></div>
    </div>

    <!-- Output -->
    <div class="output-wrap">
      <div class="out-label" id="outLabel">Output · Number Codes</div>
      <div class="out-chips" id="outChips"></div>
    </div>

    <!-- Info panel -->
    <div class="info-panel" id="infoPanel">
      <div class="info-title">↳ ENCODING LOG</div>
      <div class="info-grid" id="infoGrid"></div>
    </div>
  </div>

  <!-- FOOTER -->
        <div class="footer">
            <div style="display:flex; gap:12px;">
                <button class="foot-btn step-btn" id="prevStep" disabled>Prev Step</button>
                <button class="foot-btn step-btn" id="nextStep">Next Step</button>
                <button class="foot-btn" id="replayBtn">Restart</button>
            </div>
            <button class="foot-btn next-cipher-btn" id="btn-next">Next Cipher →</button>
        </div>
</div>

<!-- Drop package overlay -->
<div class="drop-pkg" id="dropPkg" style="display:none"></div>
<!-- Ejected number overlay -->
<div class="ejected-num" id="ejectedNum"></div>

<script>
    const GROUPS = [
      { id:'digit', name:'DIGITS',     range:'codes 0 – 9',   chars:'0123456789',         base:0,  col:'var(--col-digit)',  glow:'rgba(89,242,255,0.35)' },
      { id:'lower', name:'LOWERCASE',  range:'codes 10 – 35', chars:'abcdefghijklmnopqrstuvwxyz', base:10, col:'var(--col-lower)', glow:'rgba(185,127,255,0.35)' },
      { id:'upper', name:'UPPERCASE',  range:'codes 36 – 61', chars:'ABCDEFGHIJKLMNOPQRSTUVWXYZ', base:36, col:'var(--col-upper)', glow:'rgba(255,229,102,0.35)' },
      { id:'sym',   name:'SYMBOLS',    range:'codes 62 – 65', chars:'.?!,',                base:62, col:'var(--col-sym)',   glow:'rgba(255,159,67,0.35)'  },
    ];

    function encodeChar(ch) {
      for (const g of GROUPS) {
        const idx = g.chars.indexOf(ch);
        if (idx !== -1) return { code: g.base + idx, group: g, idx };
      }
      return null;
    }

    let currentStep = -1;
    let isAnimating = false;
    const raw = 'CIPHER';
    const chars = raw.split('');
    const n = chars.length;
    const results = chars.map(ch => {
        const enc = encodeChar(ch);
        if (!enc) return { ch, code: '?', group: null, idx: -1 };
        return { ch, code: enc.code, group: enc.group, idx: enc.idx };
    });

    /* ── DOM ── */
    const wordInput  = document.getElementById('wordInput');
    const replayBtn  = document.getElementById('replayBtn');
    const prevStepBtn = document.getElementById('prevStep');
    const nextStepBtn = document.getElementById('nextStep');
    const btnNext = document.getElementById('btn-next');
    
    const statusTxt  = document.getElementById('statusTxt');
    const beltSec    = document.getElementById('beltSection') || document.createElement('div');
    const pkgList    = document.getElementById('pkgList');
    const banksWrap  = document.getElementById('banksWrap');
    const banksRow   = document.getElementById('banksRow');
    const outLabel   = document.getElementById('outLabel');
    const outChips   = document.getElementById('outChips');
    const infoPanel  = document.getElementById('infoPanel');
    const infoGrid   = document.getElementById('infoGrid');
    const dropPkg    = document.getElementById('dropPkg');
    const ejectedNum = document.getElementById('ejectedNum');

    async function sleep(ms) {
        await new Promise(r => setTimeout(r, ms));
    }
    const vis = (el, on = true) => el.classList.toggle('vis', on);
    const setStatus = t => statusTxt.textContent = t;

    function buildBanks() {
      banksRow.innerHTML = '';
      GROUPS.forEach(g => {
        const bank = document.createElement('div');
        bank.className = `bank ${g.id}-bank`;
        bank.id = `bank-${g.id}`;

        const hdr = document.createElement('div');
        hdr.className = 'bank-header';
        hdr.innerHTML = `<div class="bank-name">${g.name}</div><div class="bank-range">${g.range}</div>`;
        bank.appendChild(hdr);

        const grid = document.createElement('div');
        grid.className = 'lockers-grid';
        g.chars.split('').forEach((ch,i) => {
          const lk = document.createElement('div');
          lk.className = 'locker';
          lk.id = `lk-${g.id}-${i}`;
          lk.innerHTML = `<span class="lk-ch">${ch === '.' ? '.' : ch === '?' ? '?' : ch === '!' ? '!' : ch === ',' ? ',' : ch}</span><span class="lk-num">${g.base+i}</span>`;
          grid.appendChild(lk);
        });
        bank.appendChild(grid);
        banksRow.appendChild(bank);
      });
    }

    function buildPackages() {
      pkgList.innerHTML = '';
      outChips.innerHTML = '';
      chars.forEach((ch,i) => {
        const pkg = document.createElement('div');
        pkg.className = 'pkg loaded';
        pkg.id = `pkg-${i}`;
        const enc = encodeChar(ch);
        pkg.innerHTML = `<span>${ch === ' ' ? '␣' : ch}</span><span class="pidx">[${i}]</span>`;
        if (!enc) pkg.style.opacity = '.3'; // unknown char
        pkgList.appendChild(pkg);

        const oc = document.createElement('div');
        oc.className = 'oc';
        oc.id = `oc-${i}`;
        oc.innerHTML = `<span class="onumval" id="onv-${i}"> </span><span class="ochara">${ch === ' ' ? '␣' : ch}</span>`;
        outChips.appendChild(oc);
      });
    }

    async function animateDrop(pkgEl, lockerEl, ch, col) {
      const pkgRect    = pkgEl.getBoundingClientRect();
      const lockerRect = lockerEl.getBoundingClientRect();

      dropPkg.textContent = ch === ' ' ? '␣' : ch;
      dropPkg.style.display = 'flex';
      dropPkg.style.width  = '44px';
      dropPkg.style.height = '44px';
      dropPkg.style.borderRadius = '8px';
      dropPkg.style.border = `2px solid ${col}`;
      dropPkg.style.color  = col;
      dropPkg.style.boxShadow = `0 0 18px ${col}`;
      dropPkg.style.background = 'rgba(5,8,15,0.95)';
      dropPkg.style.alignItems = 'center';
      dropPkg.style.justifyContent = 'center';
      dropPkg.style.fontFamily = 'Share Tech Mono, monospace';
      dropPkg.style.fontSize = '18px';
      dropPkg.style.fontWeight = '700';
      dropPkg.style.position = 'fixed';
      dropPkg.style.zIndex = '100';
      dropPkg.style.pointerEvents = 'none';
      dropPkg.style.transition = 'none';

      dropPkg.style.left = pkgRect.left + pkgRect.width/2 - 22 + 'px';
      dropPkg.style.top  = pkgRect.top  + 'px';

      await sleep(40);

      const tx = lockerRect.left + lockerRect.width/2 - 22;
      const ty = lockerRect.top  + lockerRect.height/2 - 22;

      const ms = 250;

      dropPkg.style.transition = `left ${ms}ms cubic-bezier(0.4,0,1,1), top ${ms}ms cubic-bezier(0.4,0,1,1), opacity ${ms}ms`;
      dropPkg.style.left = tx + 'px';
      dropPkg.style.top  = ty + 'px';
      dropPkg.style.opacity = '0.7';

      await sleep(ms);
      dropPkg.style.display = 'none';
    }

    async function animateEject(lockerEl, outEl, code, col) {
      const lkRect  = lockerEl.getBoundingClientRect();
      const outRect = outEl.getBoundingClientRect();

      ejectedNum.textContent = String(code);
      ejectedNum.style.color = col;
      ejectedNum.style.border = `1.5px solid ${col}`;
      ejectedNum.style.background = 'rgba(5,8,15,0.95)';
      ejectedNum.style.borderRadius = '8px';
      ejectedNum.style.padding = '5px 10px';
      ejectedNum.style.boxShadow = `0 0 16px ${col}`;
      ejectedNum.style.transition = 'none';
      ejectedNum.style.opacity = '1';

      const sx = lkRect.left  + lkRect.width/2  - 24;
      const sy = lkRect.top   + lkRect.height/2 - 16;
      ejectedNum.style.left = sx + 'px';
      ejectedNum.style.top  = sy + 'px';

      await sleep(40);

      const tx = outRect.left + outRect.width/2  - 24;
      const ty = outRect.top  + outRect.height/2 - 16;

      const ms = 250;

      ejectedNum.style.transition = `left ${ms}ms cubic-bezier(0.25,0.1,0.25,1), top ${ms}ms cubic-bezier(0.25,0.1,0.25,1), opacity ${ms}ms`;
      ejectedNum.style.left = tx + 'px';
      ejectedNum.style.top  = ty + 'px';
      ejectedNum.style.opacity = '0';

      await sleep(ms);
    }
    
    async function scanToLocker(group, targetIdx) {
      const scanMs = 30;
      for (let i = 0; i <= targetIdx; i++) {
        const lk = document.getElementById(`lk-${group.id}-${i}`);
        if (!lk) continue;
        lk.classList.add('lk-scan');
        if (i > 0) {
          const prev = document.getElementById(`lk-${group.id}-${(i-1)}`);
          if (prev && !prev.classList.contains('lk-open')) prev.classList.remove('lk-scan');
        }
        await sleep(scanMs);
      }
    }

    async function renderStep(step) {
        if (isAnimating) return;
        isAnimating = true;

        dropPkg.style.display = 'none';
        ejectedNum.style.opacity = '0';
        document.querySelectorAll('.locker').forEach(l => l.classList.remove('lk-open','lk-scan'));
        document.querySelectorAll('.bank').forEach(b => { b.classList.remove('bank-glow'); b.style.boxShadow=''; });
        document.querySelectorAll('.pkg').forEach(p => p.classList.remove('active','done'));

        if (step === -1) {
            setStatus('Ready — click Next Step to begin.');
            vis(infoPanel, false);
            for(let i=0; i<n; i++) {
                const oc = document.getElementById(`oc-${i}`);
                if(oc) {
                    oc.classList.remove('landed');
                    document.getElementById(`onv-${i}`).textContent = ' ';
                    oc.style.borderColor = 'rgba(34,211,110,0.08)';
                    oc.style.color = 'transparent';
                }
            }
            prevStepBtn.disabled = true;
            nextStepBtn.disabled = false;
            isAnimating = false;
            return;
        }

        vis(infoPanel, false);

        for (let i = 0; i < step; i++) {
            const r = results[i];
            const pkg = document.getElementById(`pkg-${i}`);
            if (pkg) pkg.classList.add('done');
            const oc = document.getElementById(`oc-${i}`);
            if (oc && r.group) {
                oc.classList.add('landed');
                document.getElementById(`onv-${i}`).textContent = r.code;
                oc.style.color = r.group.col;
                oc.style.borderColor = r.group.col.replace('var(--col-','').replace(')','');
            } else if (oc && !r.group) {
                oc.classList.add('landed');
                document.getElementById(`onv-${i}`).textContent = '?';
                oc.style.borderColor='rgba(74,96,122,0.3)';
                oc.style.color='var(--muted)';
            }
        }

        if (step >= 0 && step < n) {
            const r = results[step];
            const pkgEl = document.getElementById(`pkg-${step}`);
            if (pkgEl) pkgEl.classList.add('active');

            if (!r.group) {
                setStatus(`"${r.ch}" — not in the codebook, skipping…`);
                const oc = document.getElementById(`oc-${step}`);
                const onv = document.getElementById(`onv-${step}`);
                if (oc && onv) { onv.textContent = '?'; oc.classList.add('landed'); oc.style.borderColor='rgba(74,96,122,0.3)'; oc.style.color='var(--muted)'; }
                if (pkgEl) { pkgEl.classList.remove('active'); pkgEl.classList.add('done'); }
            } else {
                const bankEl = document.getElementById(`bank-${r.group.id}`);
                if (bankEl) {
                  bankEl.classList.add('bank-glow');
                  bankEl.style.boxShadow = `0 0 22px ${r.group.glow}`;
                }

                setStatus(`"${r.ch === ' ' ? 'SPACE' : r.ch}" → checking ${r.group.name} bank…`);
                await sleep(150);

                const lockerEl = document.getElementById(`lk-${r.group.id}-${r.idx}`);
                if (pkgEl && lockerEl) {
                  await animateDrop(pkgEl, lockerEl, r.ch, r.group.col);
                }

                setStatus(`Scanning ${r.group.name}… looking for "${r.ch === ' ' ? 'SPACE' : r.ch}"`);
                await scanToLocker(r.group, r.idx);

                if (lockerEl) lockerEl.classList.add('lk-open');
                setStatus(`Locker found! "${r.ch === ' ' ? 'SPACE' : r.ch}" = code ${r.code} 🔓`);
                await sleep(200);

                const outEl = document.getElementById(`oc-${step}`);
                if (lockerEl && outEl) {
                  await animateEject(lockerEl, outEl, r.code, r.group.col);
                }

                const onv = document.getElementById(`onv-${step}`);
                if (outEl && onv) {
                  onv.textContent = String(r.code);
                  outEl.classList.add('landed');
                  outEl.style.color = r.group.col;
                  outEl.style.borderColor = r.group.col.replace('var(--col-','').replace(')','');
                }

                await sleep(200);
                if (pkgEl) { pkgEl.classList.remove('active'); pkgEl.classList.add('done'); }
            }
        } else if (step === n) {
            for (let i = 0; i < n; i++) {
                const r = results[i];
                const pkg = document.getElementById(`pkg-${i}`);
                if (pkg) pkg.classList.add('done');
                const oc = document.getElementById(`oc-${i}`);
                if (oc && r.group) {
                    oc.classList.add('landed');
                    document.getElementById(`onv-${i}`).textContent = r.code;
                    oc.style.color = r.group.col;
                    oc.style.borderColor = r.group.col.replace('var(--col-','').replace(')','');
                }
            }
            
            const outStr = results.map(r => r.code).join(' ');
            setStatus(`All encoded! "${raw}" → [ ${outStr} ]`);
            
            const usedGroups = {};
            results.forEach(r => { if(r.group) usedGroups[r.group.name] = (usedGroups[r.group.name]||0)+1; });
            const groupSummary = Object.entries(usedGroups).map(([k,v])=>`${k}: ${v}`).join(' · ');

            infoGrid.innerHTML = `
              <div class="irow">
                <div class="irow-lbl">INPUT</div>
                <div class="irow-val" style="color:var(--yellow);font-size:11px">${raw}</div>
              </div>
              <div class="irow">
                <div class="irow-lbl">OUTPUT CODES</div>
                <div class="irow-val" style="color:var(--green);font-size:10px;letter-spacing:.04em">${outStr}</div>
              </div>
              <div class="irow">
                <div class="irow-lbl">GROUPS USED</div>
                <div class="irow-val" style="color:var(--cyan);font-size:9px">${groupSummary||'—'}</div>
              </div>
              <div class="irow">
                <div class="irow-lbl">CHARACTERS</div>
                <div class="irow-val" style="color:var(--muted);font-size:10px">${results.map(r=>`${r.ch==' '?'␣':r.ch}→${r.code}`).join('  ')}</div>
              </div>
              <div class="formula">
                <em>How it works:</em> Every character has a <strong>permanent locker number</strong>. No shifting, no mirror — just one fixed address.<br>
                <span class="gr">0–9 → 0–9</span> &nbsp;·&nbsp; <em>a–z → 10–35</em> &nbsp;·&nbsp; <strong>A–Z → 36–61</strong> &nbsp;·&nbsp; <span style="color:var(--orange)">.?!, → 62–65</span><br>
                Formula: find the <em>group base</em> + position inside the group = final code.
              </div>
            `;
            vis(infoPanel, true);
        }

        prevStepBtn.disabled = (step === -1);
        nextStepBtn.disabled = (step === n);
        isAnimating = false;
    }

    prevStepBtn.addEventListener('click', () => {
        if (currentStep > -1 && !isAnimating) {
            currentStep--;
            renderStep(currentStep);
        }
    });

    nextStepBtn.addEventListener('click', () => {
        if (currentStep < n && !isAnimating) {
            currentStep++;
            renderStep(currentStep);
        }
    });

    replayBtn.addEventListener('click', () => {
        if (isAnimating) return;
        currentStep = -1;
        renderStep(currentStep);
    });

    btnNext.addEventListener('click', () => {
        window.location.href = "level2.1.html";
    });

    window.onload = () => {
        buildBanks();
        buildPackages();
        vis(beltSec, true);
        vis(banksWrap, true);
        vis(outLabel, true);
        setTimeout(() => {
            renderStep(currentStep);
        }, 50);
    };
</script>
</body>
</html>
