<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CipherQuest | Level 4.4 | Mini RSA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --cyan: #06b6d4;
      --cyan-glow: #22d3ee;
      --orange: #f97316;
      --orange-glow: #fb923c;
      --purple: #a855f7;
      --purple-glow: #c084fc;
      --green: #22c55e;
      --bg-dark: #0f172a;
    }

    body {
      background-color: var(--bg-dark);
      color: #e2e8f0;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background-image:
        linear-gradient(rgba(30, 41, 59, 0.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30, 41, 59, 0.5) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Pipeline Animations */
    .flow-row {
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0.15;
      filter: grayscale(100%);
      transform: translateY(-10px);
    }

    .flow-row.active {
      opacity: 1;
      filter: grayscale(0%);
      transform: translateY(0);
    }

    .node {
      transition: all 0.5s ease;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    .node.glow-cyan {
      box-shadow: 0 0 15px rgba(34, 211, 238, 0.4), inset 0 0 0 2px var(--cyan-glow);
      background: rgba(6, 182, 212, 0.1);
      color: #cffafe;
    }

    .node.glow-orange {
      box-shadow: 0 0 15px rgba(251, 146, 60, 0.4), inset 0 0 0 2px var(--orange-glow);
      background: rgba(249, 115, 22, 0.1);
      color: #ffedd5;
    }

    .node.glow-purple {
      box-shadow: 0 0 15px rgba(192, 132, 252, 0.4), inset 0 0 0 2px var(--purple-glow);
      background: rgba(168, 85, 247, 0.1);
      color: #f3e8ff;
    }

    .flow-arrow {
      transition: all 0.4s ease;
      height: 0;
      opacity: 0;
    }

    .flow-row.active .flow-arrow {
      height: 24px;
      opacity: 1;
    }

    /* Joining Animation */
    .pipeline-col {
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      margin: 0 0.5rem;
    }

    .joined-mode .pipeline-col {
      margin: 0 2px;
    }

    .weld-hyphen {
      opacity: 0;
      transform: scale(0);
      transition: all 0.5s ease;
      width: 0;
    }

    .joined-mode .weld-hyphen {
      opacity: 1;
      transform: scale(1);
      width: 16px;
    }

    @keyframes pulse-border {

      0%,
      100% {
        border-color: rgba(34, 211, 238, 0.3);
      }

      50% {
        border-color: rgba(34, 211, 238, 0.8);
      }
    }

    .active-step-border {
      animation: pulse-border 2s infinite;
    }
  </style>
    <script src="global_controls.js"></script>
</head>

<body class="min-h-screen flex items-center justify-center p-4 overflow-x-hidden">

  <div
    class="w-full max-w-6xl bg-slate-900/90 border border-slate-700/80 rounded-2xl shadow-2xl backdrop-blur-md overflow-hidden flex flex-col">

    <!-- Header -->
    <header
      class="flex flex-col sm:flex-row items-center justify-between p-5 bg-slate-950/80 border-b border-slate-800">
      <div>
        <h1 class="text-xl font-bold text-white flex items-center gap-2">
          <i data-lucide="network" class="w-6 h-6 text-cyan-400"></i>
          Mini RSA
        </h1>
        <p class="text-sm text-slate-400 mt-1">Tracing RSA transformations step-by-step</p>
      </div>

      <!-- Legend / Keys -->
      <div class="flex gap-4 mt-4 sm:mt-0">
        <div class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-1.5 flex flex-col items-center">
          <span class="text-[10px] text-slate-500 font-bold uppercase">Public Key</span>
          <span class="text-sm font-mono font-bold text-yellow-400">e=3, n=33</span>
        </div>
        <div class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-1.5 flex flex-col items-center">
          <span class="text-[10px] text-slate-500 font-bold uppercase">Private Key</span>
          <span class="text-sm font-mono font-bold text-purple-400">d=7, n=33</span>
        </div>
      </div>
    </header>

    <!-- Main Pipeline Arena -->
    <main class="p-6 md:p-8 flex-1 relative flex flex-col">

      <!-- Explainer Banner -->
      <div
        class="mb-8 bg-slate-800/50 border border-slate-700 rounded-xl p-4 flex items-start gap-4 active-step-border transition-colors duration-500 min-h-[140px]">
        <div class="bg-slate-900 p-2 rounded-lg mt-1 border border-slate-700 shrink-0">
          <i data-lucide="info" class="w-5 h-5 text-cyan-400"></i>
        </div>
        <div class="w-full">
          <h2 id="step-title" class="text-lg font-bold text-cyan-400 mb-2">1. Plaintext Input</h2>
          <div id="step-desc" class="text-slate-300 text-sm leading-relaxed">
            <!-- Rich HTML descriptions injected here -->
          </div>
        </div>
      </div>

      <!-- The Pipeline Grid -->
      <div id="pipeline-container" class="flex justify-center flex-1 transition-all duration-700">

        <!-- Columns will be injected via JS to keep HTML clean -->

      </div>

      <!-- Rule Reminder Box (Hidden by default, shown on Stencil step) -->
      <div id="rule-box"
        class="absolute bottom-6 right-6 bg-slate-900/95 border-2 border-slate-700 rounded-xl p-4 shadow-2xl opacity-0 translate-y-4 transition-all duration-500 max-w-sm hidden md:block z-20">
        <h3 class="text-xs font-black uppercase text-slate-400 mb-3 tracking-wider">The < 26 Rule</h3>
            <div class="flex flex-col gap-2">
              <div class="flex items-center gap-3 bg-cyan-950/40 p-2 rounded border border-cyan-900/50">
                <div class="w-3 h-3 rounded-full bg-cyan-500"></div>
                <span class="text-xs text-cyan-100"><span class="font-bold text-cyan-400">IF < 26:</span> Converts back
                      to a Letter</span>
              </div>
              <div class="flex items-center gap-3 bg-orange-950/40 p-2 rounded border border-orange-900/50">
                <div class="w-3 h-3 rounded-full bg-orange-500"></div>
                <span class="text-xs text-orange-100"><span class="font-bold text-orange-400">IF ≥ 26:</span> Overflows,
                  stays a Number</span>
              </div>
            </div>
      </div>

    </main>

    <!-- Controls -->
    <footer class="flex items-center justify-between p-4 bg-slate-950/90 border-t border-slate-800">
      <div class="flex gap-3">
        <button id="btn-restart"
          class="bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 text-xs font-bold px-4 py-2 rounded-lg flex items-center gap-2 transition-colors">
          <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Restart
        </button>
        <button id="btn-prev"
          class="bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 text-xs font-bold px-4 py-2 rounded-lg flex items-center gap-2 transition-colors">
          <i data-lucide="arrow-left" class="w-4 h-4"></i> Prev Step
        </button>
        <button id="btn-next-step"
          class="bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 text-xs font-bold px-4 py-2 rounded-lg flex items-center gap-2 transition-colors">
          Next Step <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </button>
      </div>

      <div class="flex items-center gap-2">
        <div class="flex gap-1" id="progress-dots">
          <!-- Dots injected by JS -->
        </div>
        <button id="btn-next-level"
          class="bg-cyan-600 hover:bg-cyan-500 text-white text-xs font-bold px-4 py-2 rounded-lg flex items-center gap-2 transition-colors ml-4">
          Next Cipher <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </button>
      </div>
    </footer>

  </div>

  <script>
    lucide.createIcons();

    // The Data
    const columnsData = [
      { char: 'C', idx: '2', enc: '8', final: 'I', finalType: 'letter', dec: 'C' },
      { char: 'I', idx: '8', enc: '17', final: 'R', finalType: 'letter', dec: 'I' },
      { char: 'P', idx: '15', enc: '9', final: 'J', finalType: 'letter', dec: 'P' },
      { char: 'H', idx: '7', enc: '13', final: 'N', finalType: 'letter', dec: 'H' },
      { char: 'E', idx: '4', enc: '31', final: '31', finalType: 'number', dec: 'E' },
      { char: 'R', idx: '17', enc: '29', final: '29', finalType: 'number', dec: 'R' }
    ];

    // Upgraded rich HTML steps explaining the rules
    const steps = [
      {
        id: 0,
        title: "1. Plaintext Input",
        desc: `<p>We start with the word <strong>"CIPHER"</strong>. Each letter is loaded into its own processing column so the factory can encrypt them one by one.</p>`,
        activeRows: ['row-char'],
        joined: false, showRule: false
      },
      {
        id: 1,
        title: "2. Alphabet Index",
        desc: `<p>Computers encrypt numbers, not letters. We map each letter to its position in the alphabet:</p>
             <div class="flex gap-3 mt-3 font-mono text-xs text-slate-400 bg-slate-900 p-2 rounded w-fit border border-slate-700 shadow-inner">
               <span>A=0</span><span>B=1</span><span class="text-cyan-400 font-bold">C=2</span><span>...</span><span class="text-cyan-400 font-bold">E=4</span>
             </div>`,
        activeRows: ['row-char', 'row-idx'],
        joined: false, showRule: false
      },
      {
        id: 2,
        title: "3. Public Key Encryption",
        desc: `<p>We apply the mathematical lock using our public key: <code class="text-yellow-400 font-bold px-1 bg-yellow-900/30 rounded">y = x³ mod 33</code>.</p>
             <ul class="list-disc ml-5 mt-2 text-sm space-y-1 text-slate-300 font-mono">
               <li>For <strong>C (2)</strong>: 2³ = 8. &nbsp; 8 mod 33 = <span class="text-yellow-400 font-bold">8</span></li>
               <li>For <strong>E (4)</strong>: 4³ = 64. &nbsp; 64 mod 33 = <span class="text-yellow-400 font-bold">31</span></li>
             </ul>`,
        activeRows: ['row-char', 'row-idx', 'row-enc'],
        joined: false, showRule: false
      },
      {
        id: 3,
        title: "4. The Boundary Rule (< 26)",
        desc: `<p>Now, we map the numbers back to letters, but we have a strict rule: <strong>What if the number is bigger than the alphabet (25)?</strong></p>
             <ul class="list-disc ml-5 mt-2 text-sm space-y-1 text-slate-300">
               <li><span class="text-cyan-400 font-bold">8 is < 26</span>, so it safely morphs back to letter <strong>'I'</strong>.</li>
               <li><span class="text-orange-400 font-bold">31 is ≥ 26</span> (Overflow!), so it must stay as the raw number string <strong>"31"</strong>.</li>
             </ul>`,
        activeRows: ['row-char', 'row-idx', 'row-enc', 'row-final'],
        joined: false, showRule: true
      },
      {
        id: 4,
        title: "5. Form Ciphertext",
        desc: `<p>To finish encryption, the factory joins the tokens together with hyphens. This keeps the letters and numbers organized.</p>
             <p class="mt-2 text-slate-300">Our final TypeScript output is: <strong class="text-cyan-400 tracking-widest text-lg font-mono bg-cyan-900/30 px-2 rounded">I-R-J-N-31-29</strong></p>`,
        activeRows: ['row-char', 'row-idx', 'row-enc', 'row-final'],
        joined: true, showRule: true
      },
      {
        id: 5,
        title: "6. Private Key Decryption",
        desc: `<p>To decode, the receiver applies the Private Key restorer: <code class="text-purple-400 font-bold px-1 bg-purple-900/30 rounded">x = y⁷ mod 33</code>.</p>
             <ul class="list-disc ml-5 mt-2 text-sm space-y-1 text-slate-300 font-mono">
               <li>For <strong>I (8)</strong>: 8⁷ mod 33 mathematically reverses back to <span class="text-purple-400 font-bold">2 (C)</span></li>
               <li>For <strong>"31"</strong>: 31⁷ mod 33 reverses exactly back to <span class="text-purple-400 font-bold">4 (E)</span></li>
             </ul>`,
        activeRows: ['row-char', 'row-idx', 'row-enc', 'row-final', 'row-dec'],
        joined: true, showRule: false
      },
      {
        id: 6,
        title: "Pipeline Complete",
        desc: `<p>The decrypted indexes effortlessly morph back into the original word: <strong class="text-emerald-400">CIPHER</strong>.</p>
             <p class="mt-2 text-slate-300">The math works perfectly in both directions, demonstrating how Asymmetric Cryptography secures data!</p>`,
        activeRows: ['row-char', 'row-idx', 'row-enc', 'row-final', 'row-dec'],
        joined: false, showRule: false
      }
    ];

    let speedMultiplier = 1.0;
let currentStep = 0;
    let isPlaying = true;
    let playInterval;
    const $ = (id) => document.getElementById(id);

    // 1. Build the DOM Pipeline
    function buildPipeline() {
      const container = $('pipeline-container');
      container.innerHTML = '';

      columnsData.forEach((col, i) => {
        const colDiv = document.createElement('div');
        colDiv.className = 'pipeline-col flex flex-col items-center';

        const finalColorClass = col.finalType === 'letter' ? 'glow-cyan' : 'glow-orange';

        colDiv.innerHTML = `
        <!-- Row 1: Char -->
        <div class="flow-row row-char flex flex-col items-center w-full">
          <div class="node bg-slate-800 rounded-lg w-12 h-12 md:w-16 md:h-16 flex items-center justify-center text-xl md:text-2xl font-black">${col.char}</div>
          <div class="flow-arrow flex flex-col items-center justify-center text-slate-600">
            <div class="w-0.5 h-full bg-slate-600"></div>
            <i data-lucide="chevron-down" class="w-4 h-4 -mt-2"></i>
          </div>
        </div>

        <!-- Row 2: Index -->
        <div class="flow-row row-idx flex flex-col items-center w-full">
          <div class="text-[10px] text-slate-500 mb-1 font-mono uppercase">Index</div>
          <div class="node bg-slate-800 rounded-lg w-10 h-10 md:w-14 md:h-14 flex items-center justify-center text-lg md:text-xl font-bold font-mono text-slate-300">${col.idx}</div>
          <div class="flow-arrow flex flex-col items-center justify-center text-yellow-600/50">
            <div class="text-[9px] font-mono text-yellow-500/70 mb-1 absolute ml-16 bg-slate-900/80 px-1 rounded whitespace-nowrap ${i === 0 ? 'block' : 'hidden'}">x³ mod 33</div>
            <div class="w-0.5 h-full bg-yellow-600/50"></div>
            <i data-lucide="chevron-down" class="w-4 h-4 -mt-2 text-yellow-600/50"></i>
          </div>
        </div>

        <!-- Row 3: Encrypted Num -->
        <div class="flow-row row-enc flex flex-col items-center w-full">
          <div class="node bg-slate-800 rounded-lg border border-yellow-500/30 w-10 h-10 md:w-14 md:h-14 flex items-center justify-center text-lg md:text-xl font-bold font-mono text-yellow-400">${col.enc}</div>
          <div class="flow-arrow flex flex-col items-center justify-center text-slate-600">
            <div class="text-[9px] font-mono text-slate-400 mb-1 absolute ml-14 bg-slate-900/80 px-1 rounded whitespace-nowrap ${i === 0 ? 'block' : 'hidden'}">rule check</div>
            <div class="w-0.5 h-full bg-slate-600"></div>
            <i data-lucide="chevron-down" class="w-4 h-4 -mt-2"></i>
          </div>
        </div>

        <!-- Row 4: Final Token -->
        <div class="flow-row row-final flex flex-col items-center w-full z-10 relative">
          <div class="flex items-center">
            <div class="node ${finalColorClass} rounded-lg w-12 h-12 md:w-16 md:h-16 flex items-center justify-center text-xl md:text-2xl font-black font-mono transition-all duration-500">${col.final}</div>
            
            <!-- Hyphen for joined state (skip last one) -->
            ${i < columnsData.length - 1 ? `<div class="weld-hyphen flex items-center justify-center text-cyan-500 font-black"><i data-lucide="minus" class="w-4 h-4"></i></div>` : ''}
          </div>
          <div class="flow-arrow flex flex-col items-center justify-center text-purple-600/50">
             <div class="text-[9px] font-mono text-purple-400/80 mb-1 absolute ml-16 bg-slate-900/80 px-1 rounded whitespace-nowrap ${i === 0 ? 'block' : 'hidden'}">y⁷ mod 33</div>
            <div class="w-0.5 h-full bg-purple-600/50"></div>
            <i data-lucide="chevron-down" class="w-4 h-4 -mt-2 text-purple-600/50"></i>
          </div>
        </div>

        <!-- Row 5: Decrypted -->
        <div class="flow-row row-dec flex flex-col items-center w-full">
           <div class="node glow-purple rounded-lg w-12 h-12 md:w-16 md:h-16 flex items-center justify-center text-xl md:text-2xl font-black">${col.dec}</div>
        </div>
      `;
        container.appendChild(colDiv);
      });

      // Build progress dots
      const dotsContainer = $('progress-dots');
      steps.forEach((s, i) => {
        const dot = document.createElement('div');
        dot.className = `w-2 h-2 rounded-full transition-colors duration-300 ${i === 0 ? 'bg-cyan-500' : 'bg-slate-700'}`;
        dot.id = `dot-${i}`;
        dotsContainer.appendChild(dot);
      });

      lucide.createIcons();
    }

    // 2. Render State
    function renderStep(stepIndex) {
      const step = steps[stepIndex];

      // Text updates using innerHTML for rich text formatting
      $('step-title').textContent = step.title;
      $('step-desc').innerHTML = step.desc;

      // Row visibility updates
      const allRows = document.querySelectorAll('.flow-row');
      allRows.forEach(row => row.classList.remove('active'));

      step.activeRows.forEach(rowClass => {
        document.querySelectorAll(`.${rowClass}`).forEach(el => el.classList.add('active'));
      });

      // Join mode (hyphens)
      const container = $('pipeline-container');
      if (step.joined) {
        container.classList.add('joined-mode');
      } else {
        container.classList.remove('joined-mode');
      }

      // Rule Box
      const ruleBox = $('rule-box');
      if (step.showRule) {
        ruleBox.classList.remove('opacity-0', 'translate-y-4');
        ruleBox.classList.add('opacity-100', 'translate-y-0');
      } else {
        ruleBox.classList.add('opacity-0', 'translate-y-4');
        ruleBox.classList.remove('opacity-100', 'translate-y-0');
      }

      // Progress dots
      steps.forEach((s, i) => {
        const dot = $(`dot-${i}`);
        if (i === stepIndex) {
          dot.classList.add('bg-cyan-500');
          dot.classList.remove('bg-slate-700');
        } else {
          dot.classList.remove('bg-cyan-500');
          dot.classList.add('bg-slate-700');
        }
      });
    }

    // 3. Flow Control
    function nextStep() {
      if (currentStep < steps.length - 1) {
        currentStep++;
        renderStep(currentStep);
      }
    }

    function prevStep() {
      if (currentStep > 0) {
        currentStep--;
        renderStep(currentStep);
      }
    }

    function restart() {
      currentStep = 0;
      renderStep(0);
    }

    // 4. Init
    window.addEventListener('DOMContentLoaded', () => {
      buildPipeline();
      renderStep(0);

      $('btn-next-step').addEventListener('click', nextStep);
      $('btn-prev').addEventListener('click', prevStep);
      $('btn-restart').addEventListener('click', restart);
      
      const nextLevelBtn = document.getElementById('btn-next-level');
      if (nextLevelBtn) {
        nextLevelBtn.addEventListener('click', () => {
          const match = window.location.pathname.match(/level(\d+)\.(\d+)\.html/);
          if (match) {
            let ch = parseInt(match[1]);
            let lvl = parseInt(match[2]);
            lvl++;
            if (lvl > 5) { lvl = 1; ch++; }
            if (ch <= 4) window.location.href = `level${ch}.${lvl}.html`;
          }
        });
      }
    });
</script>
</body>

</html>
