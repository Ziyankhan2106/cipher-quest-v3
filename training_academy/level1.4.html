<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CipherQuest | Level 1.4 | Monoalphabetic Substitution</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

:root {
  --bg:     #05080f;
  --panel:  rgba(12,18,34,0.92);
  --border: rgba(148,163,184,0.34);
  --cyan:   #59f2ff;
  --yellow: #ffdd57;
  --purple: #b97fff;
  --green:  #22c55e;
  --muted:  #4a607a;
  --text:   #cde0f5;
  --mono:   'Share Tech Mono', monospace;
  --sans:   'Rajdhani', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

body {
  background: var(--bg);
  font-family: var(--sans);
  color: var(--text);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  overflow-x: hidden;
  cursor: url('/assets/mouse.png') 4 4, auto;
}

/* Global cursor enforcement */
* {
  cursor: inherit !important;
}

a, button, [role="button"], input, textarea, select {
  cursor: url('/assets/mouse.png') 4 4, pointer !important;
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 55% 35% at 15% 10%, rgba(185,127,255,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 45% 40% at 85% 85%, rgba(89,242,255,0.05) 0%, transparent 70%);
}
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    linear-gradient(rgba(185,127,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(185,127,255,0.02) 1px, transparent 1px);
  background-size:40px 40px;
}

/* ── Card ── */
.card {
  position:relative; z-index:1;
  width:100%; max-width:760px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:18px;
  backdrop-filter:blur(20px);
  box-shadow:0 0 0 1px rgba(185,127,255,0.04), 0 40px 100px rgba(0,0,0,0.85);
  overflow:hidden;
}

/* ── Top bar ── */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 20px;
  background:rgba(5,8,15,0.7);
  border-bottom:1px solid var(--border);
}
.topbar-left { display:flex; align-items:center; gap:10px; }
.badge {
  font-family:var(--mono); font-size:10px; letter-spacing:.2em;
  padding:3px 10px; border-radius:4px;
  border:1px solid rgba(185,127,255,0.5);
  color:var(--purple); background:rgba(185,127,255,0.06);
}
.topbar-title{font-family:'SF Mono','Fira Code',Consolas,monospace;font-size:22px;font-weight:800;text-transform:uppercase;letter-spacing:0.15em;}
.topbar-sub { font-family:var(--mono); font-size:9px; color:var(--muted); margin-top:2px; letter-spacing:.15em; }
.live {
  display:flex; align-items:center; gap:6px;
  font-family:var(--mono); font-size:11px; color:var(--green);
  letter-spacing:.16em; text-transform:uppercase;
}
.live::before {
  content:''; width:6px; height:6px; border-radius:50%;
  background:var(--green); box-shadow:0 0 10px var(--green);
  animation:pulse 1.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

/* ── Controls ── */
.controls {
  display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  padding:12px 20px;
  border-bottom:1px solid rgba(89,242,255,0.08);
  background:rgba(5,8,15,0.4);
}
.ctrl-label { font-family:var(--mono); font-size:9px; color:var(--muted); letter-spacing:.2em; }
.word-input {
  font-family:var(--mono); font-size:14px; font-weight:700;
  background:rgba(5,8,15,0.8);
  border:1px solid rgba(185,127,255,0.28);
  border-radius:8px;
  padding:6px 14px; color:var(--purple);
  letter-spacing:.2em; text-transform:uppercase;
  outline:none; width:180px;
  transition:border-color .2s, box-shadow .2s;
}
.word-input:focus { border-color:rgba(185,127,255,0.6); box-shadow:0 0 14px rgba(185,127,255,0.15); }
.go-btn {
  margin-left:auto;
  padding:7px 22px; border-radius:999px;
  border:none; background:var(--purple); color:#05080f;
  font-family:var(--sans); font-size:11px; font-weight:700;
  letter-spacing:.14em; text-transform:uppercase;
  cursor:pointer; transition:all .2s;
}
.go-btn:hover { box-shadow:0 0 22px rgba(185,127,255,0.55); background:#cba6ff; }
.go-btn:disabled { opacity:.4; cursor:not-allowed; }

/* ── Stage ── */
.stage {
  padding:22px 20px 20px;
  display:flex; flex-direction:column; align-items:center; gap:14px;
  position:relative; min-height:460px;
}
.stage::after {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:repeating-linear-gradient(
    to bottom, transparent 0, transparent 3px,
    rgba(185,127,255,0.008) 3px, rgba(185,127,255,0.008) 4px
  );
}

/* ── Status ── */
.status {
  font-family:var(--mono); font-size:11px; color:var(--purple);
  letter-spacing:.2em; min-height:18px;
  align-self:flex-start; position:relative; z-index:2;
}
.blink { animation:blink .9s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }

/* ── Word chips (input) ── */
.word-display { display:flex; gap:8px; position:relative; z-index:2; }
.letter-chip {
  width:50px; height:56px; border-radius:10px;
  border:1px solid rgba(185,127,255,0.2);
  background:rgba(5,8,15,0.7);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px;
  font-family:var(--mono); font-size:20px; font-weight:700; color:var(--text);
  transition:all .35s; opacity:0;
  position:relative; overflow:hidden;
}
.letter-chip .idx { font-size:8px; color:var(--muted); letter-spacing:.1em; }
.letter-chip.active {
  border-color:var(--yellow); color:var(--yellow);
  box-shadow:0 0 22px rgba(255,229,102,0.45), inset 0 0 10px rgba(255,229,102,0.06);
}
.letter-chip.active::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,transparent 40%,rgba(255,229,102,.1) 60%,transparent 80%);
  animation:shimmer 1.1s linear infinite;
}
@keyframes shimmer { from{transform:translateX(-120%)} to{transform:translateX(200%)} }
.letter-chip.done { border-color:rgba(185,127,255,0.4); color:rgba(185,127,255,0.7); }

/* ── Mirror grid ── */
.mirror-section {
  position:relative; z-index:2; width:100%;
  opacity:0; transition:opacity .5s;
}
.mirror-section.vis { opacity:1; }
.mirror-grid-label {
  display:flex; justify-content:space-between;
  font-family:var(--mono); font-size:9px; color:var(--muted);
  letter-spacing:.18em; margin-bottom:6px; padding:0 2px;
}
.mirror-grid-label span { color:var(--yellow); }
.mirror-grid-label span.rev { color:var(--cyan); }

/* The two alphabet rows + axis */
.mirror-block {
  background:rgba(5,8,15,0.7);
  border:1px solid rgba(185,127,255,0.14);
  border-radius:12px;
  overflow:hidden;
  position:relative;
}

/* Top row: A→Z */
.alpha-row {
  display:flex; width:100%; overflow:hidden;
}
.alpha-cell {
  flex:1; min-width:0;
  height:46px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:1px;
  font-family:var(--mono); font-size:13px;
  color:var(--muted);
  border-right:1px solid rgba(185,127,255,0.05);
  transition:color .25s, background .25s, box-shadow .25s;
  position:relative; cursor:default;
}
.alpha-cell:last-child { border-right:none; }
.alpha-cell .apos { font-size:7px; color:rgba(74,96,122,0.5); }

.alpha-cell.src-glow {
  color:var(--yellow);
  background:rgba(255,229,102,0.08);
  box-shadow:inset 0 0 12px rgba(255,229,102,0.12);
  text-shadow:0 0 14px rgba(255,229,102,0.9);
}
.alpha-cell.dst-glow {
  color:var(--cyan);
  background:rgba(89,242,255,0.08);
  box-shadow:inset 0 0 12px rgba(89,242,255,0.12);
  text-shadow:0 0 14px rgba(89,242,255,0.9);
}
.alpha-cell.pair-soft {
  color:rgba(185,127,255,0.55);
}

/* Mirror axis */
.mirror-axis {
  position:relative;
  height:26px;
  display:flex; align-items:center;
  overflow:hidden;
}
.axis-line {
  position:absolute; left:0; right:0; top:50%;
  height:1px;
  background:linear-gradient(to right,
    transparent 0%,
    rgba(185,127,255,0.15) 5%,
    rgba(185,127,255,0.6) 50%,
    rgba(185,127,255,0.15) 95%,
    transparent 100%
  );
}
.axis-label {
  position:absolute; left:50%; transform:translateX(-50%);
  font-family:var(--mono); font-size:8px; letter-spacing:.22em;
  color:rgba(185,127,255,0.7);
  background:rgba(5,8,15,0.85);
  padding:1px 8px; border-radius:3px;
  border:1px solid rgba(185,127,255,0.2);
  white-space:nowrap;
}

/* The beam column that travels down */
.beam-col {
  position:absolute;
  top:0; bottom:0;
  width:0;
  pointer-events:none;
  z-index:4;
  transition:left .0s;
}
.beam-col.active {
  width:1px;
  background:linear-gradient(to bottom,
    rgba(255,229,102,0) 0%,
    rgba(255,229,102,0.9) 40%,
    rgba(185,127,255,0.9) 60%,
    rgba(89,242,255,0) 100%
  );
  box-shadow: 0 0 12px 3px rgba(185,127,255,0.4);
}

/* ── Output word ── */
.output-wrap {
  position:relative; z-index:2;
  display:flex; flex-direction:column; align-items:center; gap:8px;
  width:100%;
}
.output-lbl {
  font-family:var(--mono); font-size:9px; color:var(--muted);
  letter-spacing:.2em; align-self:flex-start;
  opacity:0; transition:opacity .3s;
}
.output-lbl.vis { opacity:1; }
.output-chips { display:flex; gap:8px; }
.out-chip {
  width:50px; height:56px; border-radius:10px;
  border:1px solid rgba(89,242,255,0.08);
  background:rgba(5,8,15,0.5);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px;
  font-family:var(--mono); font-size:20px; color:transparent;
  transition:all .4s;
}
.out-chip .idx { font-size:8px; color:var(--muted); }
.out-chip.landed {
  color:var(--cyan);
  border-color:rgba(89,242,255,0.5);
  box-shadow:0 0 22px rgba(89,242,255,0.35);
  animation:landIn .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes landIn {
  from{transform:scale(.7) translateY(-10px);opacity:0;}
  to{transform:scale(1) translateY(0);opacity:1;}
}

/* ── Pair legend ── */
.pair-legend {
  position:relative; z-index:2; width:100%;
  opacity:0; transform:translateY(6px);
  transition:opacity .5s, transform .5s;
}
.pair-legend.vis { opacity:1; transform:translateY(0); }
.pair-legend-title {
  font-family:var(--mono); font-size:9px; color:var(--purple);
  letter-spacing:.22em; margin-bottom:10px;
}
.pair-grid {
  display:flex; flex-wrap:wrap; gap:5px;
}
.pair-pill {
  font-family:var(--mono); font-size:10px;
  padding:3px 8px; border-radius:5px;
  border:1px solid rgba(185,127,255,0.15);
  background:rgba(5,8,15,0.5);
  color:var(--muted);
  transition:all .3s;
}
.pair-pill.active-pair {
  border-color:rgba(185,127,255,0.5);
  color:var(--purple);
  box-shadow:0 0 10px rgba(185,127,255,0.25);
}
.pair-pill span.a { color:var(--yellow); }
.pair-pill span.b { color:var(--cyan); }

/* ── Info panel ── */
.info-panel {
  position:relative; z-index:2; width:100%;
  background:rgba(5,8,15,0.6);
  border:1px solid rgba(185,127,255,0.14);
  border-radius:12px; padding:14px 18px;
  opacity:0; transform:translateY(8px);
  transition:opacity .5s, transform .5s;
}
.info-panel.vis { opacity:1; transform:translateY(0); }
.info-title {
  font-family:var(--mono); font-size:9px; color:var(--purple);
  letter-spacing:.22em; margin-bottom:10px;
}
.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.info-row {
  background:rgba(5,8,15,0.5);
  border:1px solid rgba(185,127,255,0.08);
  border-radius:8px; padding:10px 12px;
}
.info-row-label { font-family:var(--mono); font-size:8px; color:var(--muted); letter-spacing:.18em; margin-bottom:4px; }
.info-row-val { font-family:var(--mono); font-size:13px; font-weight:700; letter-spacing:.1em; }
.formula {
  grid-column:1/-1;
  font-family:var(--mono); font-size:11px; color:var(--text); line-height:1.75;
  background:rgba(5,8,15,0.8);
  border:1px solid rgba(185,127,255,0.12);
  border-radius:8px; padding:12px 14px;
}
.formula em { color:var(--cyan); font-style:normal; }
.formula strong { color:var(--yellow); }
.formula .purple { color:var(--purple); }

/* ── Footer ── */
.footer {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 20px;
  border-top:1px solid rgba(148,163,184,0.34);
  background:rgba(2,6,23,0.74);
}
.foot-btn {
  font-family:var(--sans); font-size:11px; font-weight:600;
  letter-spacing:.12em; text-transform:uppercase;
  padding:7px 16px; border-radius:999px;
  border:1px solid rgba(185,127,255,0.25);
  background:transparent; color:var(--muted);
  cursor:pointer; transition:all .2s;
}
.foot-btn:hover { color:var(--text); border-color:rgba(185,127,255,0.5); }
.foot-btn.primary {
  color:var(--purple); background:rgba(185,127,255,0.06);
  border-color:rgba(185,127,255,0.4);
}
.foot-btn.primary:hover { background:rgba(185,127,255,0.12); box-shadow:0 0 14px rgba(185,127,255,0.3); }

        #speedDown,
        #speedUp {
            width: 28px;
            height: 26px;
            display: inline-grid;
            place-items: center;
            padding: 0;
            border: 1px solid rgba(89, 242, 255, 0.36);
            border-radius: 999px;
            background: rgba(89, 242, 255, 0.08);
            color: #59f2ff;
            font-size: 14px;
            font-weight: 900;
            line-height: 1;
            cursor: pointer;
            transition: background .18s ease, box-shadow .18s ease, transform .18s ease;
        }

        #speedDown:hover,
        #speedUp:hover {
            background: rgba(89, 242, 255, 0.16);
            box-shadow: 0 0 14px rgba(89, 242, 255, 0.24);
            transform: translateY(-1px);
        }

        #speedDisplay {
            min-width: 44px;
            color: #dffbff;
            font-variant-numeric: tabular-nums;
            text-align: center;
            font-family: "SF Mono", "Fira Code", Consolas, monospace;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .08em;
        }

        #btn-play,
        #btn-step,
        #btn-next,
        #replay,
        #replayBtn,
        #replayNow,
        #nextBtn,
        .btn,
        .foot-btn {
            min-height: 34px;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: .1em;
            font-size: 11px;
            font-weight: 800;
        }

        #btn-play,
        #replay,
        #replayBtn,
        #replayNow {
            border: 1px solid rgba(89, 242, 255, 0.46);
            background: rgba(89, 242, 255, 0.10);
            color: #59f2ff;
        }

        #btn-next,
        #btn-step,
        #nextBtn,
        .foot-btn.primary {
            border: 1px solid rgba(255, 221, 87, 0.46);
            background: rgba(255, 221, 87, 0.10);
            color: #ffdd57;
        }

        #btn-play:hover,
        #btn-step:hover,
        #btn-next:hover,
        #replay:hover,
        #replayBtn:hover,
        #replayNow:hover,
        #nextBtn:hover {
            box-shadow: 0 0 16px rgba(89, 242, 255, 0.22);
        }

    
        .step-btn {
            background: #59f2ff !important;
            color: #000 !important;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px) !important;
            border: none !important;
            border-radius: 0 !important;
            font-weight: 800 !important;
        }
        .step-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed !important;
        }
        .next-cipher-btn {
            background: #ffdd57 !important;
            color: #000 !important;
            border: none !important;
            font-weight: 800 !important;
        }

    
    
    /* -- PERFECTED BUTTON STYLES -- */
    .foot-btn, .step-btn, .next-cipher-btn, .go-btn, #goBtn, #replayBtn, #btn-next, #prevStep, #nextStep, #startBtn, #nextBtn {
        padding: 8px 16px !important;
        border-radius: 8px !important;
        font-size: 12px !important;
        font-weight: 700 !important;
        text-transform: uppercase !important;
        letter-spacing: 0.1em !important;
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 8px !important;
        clip-path: none !important;
        min-height: auto !important;
        box-sizing: border-box !important;
        cursor: pointer;
        transition: all 0.2s ease !important;
        font-family: inherit !important;
    }

    /* NEXT STEP & PREV STEP */
    #prevStep, #nextStep, .step-btn:not(#goBtn):not(#startBtn):not(.go-btn) {
        background: #59f2ff !important;
        color: #000 !important;
        border: 1px solid #59f2ff !important;
        opacity: 1 !important;
    }

    #prevStep:disabled, #nextStep:disabled, .step-btn:disabled {
        background: rgba(89, 242, 255, 0.4) !important;
        color: rgba(0, 0, 0, 0.7) !important;
        border: 1px solid transparent !important;
        cursor: not-allowed !important;
        box-shadow: none !important;
    }

    #prevStep:hover:not(:disabled), #nextStep:hover:not(:disabled), .step-btn:hover:not(:disabled) {
        box-shadow: 0 0 14px rgba(89, 242, 255, 0.4) !important;
    }

    /* RESTART & START */
    #replayBtn, #goBtn, #startBtn, .go-btn, #replay, #replayNow {
        background: #1e293b !important;
        color: #cbd5e1 !important;
        border: 1px solid #334155 !important;
    }
    
    #replayBtn:hover:not(:disabled), #goBtn:hover:not(:disabled), #startBtn:hover:not(:disabled), .go-btn:hover:not(:disabled), #replay:hover:not(:disabled), #replayNow:hover:not(:disabled) {
        background: #334155 !important;
        color: #f1f5f9 !important;
    }

    /* NEXT CIPHER */
    #btn-next, .next-cipher-btn, #nextBtn {
        background: #ffdd57 !important;
        color: #000 !important;
        border: 1px solid #ffdd57 !important;
    }
    #btn-next:hover, .next-cipher-btn:hover, #nextBtn:hover {
        box-shadow: 0 0 16px rgba(255, 221, 87, 0.5) !important;
    }

    </style>
    <script src="global_controls.js"></script>
</head>
<body>

<div class="card">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="badge">CH 01</span>
      <div>
        <div class="topbar-title">Monoalphabetic Substitution</div>
        <div class="topbar-sub">Level 4 - CUSTOM KEY</div>
      </div>
    </div>
    <div class="live">Auto Demo</div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <span class="ctrl-label" style="display:none;">WORD</span>
    <input class="word-input" id="wordInput" type="hidden" value="CIPHER" />
  </div>

  <!-- STAGE -->
  <div class="stage" id="stage">

    <div class="status" id="status">
      <span id="statusTxt">Ready to encrypt</span><span class="blink"> ▌</span>
    </div>

    <!-- Input chips -->
    <div class="word-display" id="wordDisplay"></div>

    <!-- Mirror section -->
    <div class="mirror-section" id="mirrorSection">
      <div class="mirror-grid-label">
        <span>A → Z &nbsp;·&nbsp; PLAIN</span>
        <span class="rev">KEY &nbsp;·&nbsp; CIPHER</span>
      </div>
      <div class="mirror-block" id="mirrorBlock">
        <!-- Top row: A-Z -->
        <div class="alpha-row" id="topRow"></div>
        <!-- Axis -->
        <div class="mirror-axis">
          <div class="axis-line"></div>
          <div class="axis-label">◆ SUBSTITUTION AXIS · pos i → key[i] ◆</div>
        </div>
        <!-- Bottom row: Z-A -->
        <div class="alpha-row" id="botRow"></div>
        <!-- The beam element -->
        <div class="beam-col" id="beamCol"></div>
      </div>
    </div>

    <!-- Output word -->
    <div class="output-wrap">
      <div class="output-lbl" id="outputLbl">Output · Encrypted String</div>
      <div class="output-chips" id="outputChips"></div>
    </div>

    <!-- Pair legend -->
    <div class="pair-legend" id="pairLegend">
      <div class="pair-legend-title">↳ SUBSTITUTION MAP — custom randomized key</div>
      <div class="pair-grid" id="pairGrid"></div>
    </div>

    <!-- Info panel -->
    <div class="info-panel" id="infoPanel">
      <div class="info-title">↳ CIPHER BREAKDOWN</div>
      <div class="info-grid" id="infoGrid"></div>
    </div>

  </div><!-- /stage -->

  <!-- FOOTER -->
        <div class="footer">
            <div style="display:flex; gap:12px;">
                <button class="foot-btn step-btn" id="prevStep" disabled>Prev Step</button>
                <button class="foot-btn step-btn" id="nextStep">Next Step</button>
                <button class="foot-btn" id="replayBtn">Restart</button>
            </div>
            <button class="foot-btn next-cipher-btn" id="btn-next">Next Cipher →</button>
        </div>

</div>

<script>
    const ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const SUBST = 'QWERTYUIOPASDFGHJKLZXCVBNM';
    
    let currentStep = -1;
    let isAnimating = false;
    const raw = 'CIPHER';
    const word = raw.split('');
    const n = word.length;
    const results = word.map(ch => {
        const srcIdx = ALPHA.indexOf(ch);
        const dstIdx = srcIdx;
        const dstCh = SUBST[srcIdx];
        return { ch, srcIdx, dstIdx, dstCh };
    });

    /* ── DOM ── */
    const wordInput = document.getElementById('wordInput');
    const replayBtn = document.getElementById('replayBtn');
    const prevStepBtn = document.getElementById('prevStep');
    const nextStepBtn = document.getElementById('nextStep');
    const btnNext = document.getElementById('btn-next');
    
    const statusTxt = document.getElementById('statusTxt');
    const wordDisplay = document.getElementById('wordDisplay');
    const mirrorSec = document.getElementById('mirrorSection');
    const topRow = document.getElementById('topRow');
    const botRow = document.getElementById('botRow');
    const beamCol = document.getElementById('beamCol');
    const mirrorBlock = document.getElementById('mirrorBlock');
    const outputLbl = document.getElementById('outputLbl');
    const outputChips = document.getElementById('outputChips');
    const pairLegend = document.getElementById('pairLegend');
    const pairGrid = document.getElementById('pairGrid');
    const infoPanel = document.getElementById('infoPanel');
    const infoGrid = document.getElementById('infoGrid');

    /* ── Helpers ── */
    async function sleep(ms) {
        await new Promise(r => setTimeout(r, ms));
    }
    const vis = (el, on = true) => el.classList.toggle('vis', on);
    const setStatus = t => statusTxt.textContent = t;

    /* ── Build alphabet rows ── */
    function buildRows() {
      topRow.innerHTML = '';
      botRow.innerHTML = '';
      for (let i = 0; i < 26; i++) {
        const t = document.createElement('div');
        t.className = 'alpha-cell';
        t.id = 'top' + i;
        t.innerHTML = `<span>${ALPHA[i]}</span><span class="apos">${i}</span>`;
        topRow.appendChild(t);

        const b = document.createElement('div');
        b.className = 'alpha-cell';
        b.id = 'bot' + i;
        b.innerHTML = `<span>${SUBST[i]}</span><span class="apos">${i}</span>`;
        botRow.appendChild(b);
      }
    }

    /* ── Build chips ── */
    function buildChips(word) {
      wordDisplay.innerHTML = '';
      outputChips.innerHTML = '';
      word.split('').forEach((ch, i) => {
        const chip = document.createElement('div');
        chip.className = 'letter-chip';
        chip.id = 'wchip' + i;
        chip.innerHTML = `<span>${ch}</span><span class="idx">[${i}]</span>`;
        chip.style.opacity = '1';
        wordDisplay.appendChild(chip);

        const oc = document.createElement('div');
        oc.className = 'out-chip';
        oc.id = 'ochip' + i;
        oc.innerHTML = `<span id="ochr${i}"> </span><span class="idx">[${i}]</span>`;
        outputChips.appendChild(oc);
      });
    }

    /* ── Build pair legend ── */
    function buildPairLegend() {
      pairGrid.innerHTML = '';
      for (let i = 0; i < 26; i++) {
        const pill = document.createElement('div');
        pill.className = 'pair-pill';
        pill.id = 'pill' + i;
        pill.innerHTML = `<span class="a">${ALPHA[i]}</span>→<span class="b">${SUBST[i]}</span>`;
        pairGrid.appendChild(pill);
      }
    }

    /* ── Get cell left center (% of block width) ── */
    function getCellLeft(idx) {
      const cell = document.getElementById('top' + idx);
      if(!cell) return 0;
      const block = mirrorBlock.getBoundingClientRect();
      const rect = cell.getBoundingClientRect();
      return rect.left - block.left + rect.width / 2;
    }

    /* ── Clear row highlights ── */
    function clearHighlights() {
      for (let i = 0; i < 26; i++) {
        document.getElementById('top' + i).classList.remove('src-glow', 'dst-glow', 'pair-soft');
        document.getElementById('bot' + i).classList.remove('src-glow', 'dst-glow', 'pair-soft');
      }
      document.querySelectorAll('.pair-pill').forEach(p => p.classList.remove('active-pair'));
    }

    async function renderStep(step) {
        if (isAnimating) return;
        isAnimating = true;

        clearHighlights();
        document.querySelectorAll('.letter-chip').forEach(c => c.classList.remove('active', 'done'));
        beamCol.classList.remove('active');

        if (step === -1) {
            setStatus('Ready to encrypt');
            vis(mirrorSec, false);
            vis(pairLegend, false);
            vis(infoPanel, false);
            outputLbl.classList.remove('vis');
            infoGrid.innerHTML = '';
            for(let i=0; i<n; i++) {
                const oc = document.getElementById('ochip' + i);
                if(oc) {
                    oc.classList.remove('landed');
                    document.getElementById('ochr' + i).textContent = ' ';
                }
            }
            prevStepBtn.disabled = true;
            nextStepBtn.disabled = false;
            isAnimating = false;
            return;
        }

        vis(mirrorSec, true);
        vis(outputLbl, true);
        vis(pairLegend, false);
        vis(infoPanel, false);

        for (let i = 0; i < 26; i++) {
            document.getElementById('top' + i).classList.add('pair-soft');
            document.getElementById('bot' + i).classList.add('pair-soft');
        }

        for (let i = 0; i < step; i++) {
            document.getElementById('wchip' + i).classList.add('done');
            const oc = document.getElementById('ochip' + i);
            oc.classList.add('landed');
            document.getElementById('ochr' + i).textContent = results[i].dstCh;
        }

        if (step >= 0 && step < n) {
            const r = results[step];
            const activeChip = document.getElementById('wchip' + step);
            activeChip.classList.add('active');

            setStatus(`Substituting "${r.ch}" (pos ${r.srcIdx}) → "${r.dstCh}"`);

            document.getElementById('top' + r.srcIdx).classList.add('src-glow');
            const pillIdx = r.srcIdx;
            const pill = document.getElementById('pill' + pillIdx);
            if (pill) pill.classList.add('active-pair');

            await sleep(150);

            const srcLeft = getCellLeft(r.srcIdx);
            beamCol.style.transition = 'none';
            beamCol.style.left = srcLeft + 'px';
            beamCol.style.transform = 'translateX(-50%)';
            beamCol.classList.add('active');

            await sleep(50);

            if (r.srcIdx !== r.dstIdx) {
                const dstLeft = getCellLeft(r.dstIdx);
                beamCol.style.transition = `left 0.4s cubic-bezier(0.4,0,0.2,1)`;
                beamCol.style.left = dstLeft + 'px';
                await sleep(400);
            }

            document.getElementById('bot' + r.dstIdx).classList.add('dst-glow');
            await sleep(200);

            beamCol.classList.remove('active');
            
            const oc = document.getElementById('ochip' + step);
            document.getElementById('ochr' + step).textContent = r.dstCh;
            oc.classList.add('landed');
            
            await sleep(200);
            activeChip.classList.remove('active');
            activeChip.classList.add('done');
        } else if (step === n) {
            for (let i = 0; i < n; i++) {
                document.getElementById('wchip' + i).classList.add('done');
                const oc = document.getElementById('ochip' + i);
                oc.classList.add('landed');
                document.getElementById('ochr' + i).textContent = results[i].dstCh;
            }
            
            setStatus(`Substitution complete · "${raw}" → "${results.map(r => r.dstCh).join('')}"`);
            clearHighlights();
            vis(pairLegend, true);

            infoGrid.innerHTML = `
                <div class="info-row">
                  <div class="info-row-label">INPUT</div>
                  <div class="info-row-val" style="color:var(--yellow)">${raw}</div>
                </div>
                <div class="info-row">
                  <div class="info-row-label">OUTPUT</div>
                  <div class="info-row-val" style="color:var(--cyan)">${results.map(r => r.dstCh).join('')}</div>
                </div>
                <div class="info-row">
                  <div class="info-row-label">CIPHER TYPE</div>
                  <div class="info-row-val" style="color:var(--purple)">SUBSTITUTION</div>
                </div>
                <div class="info-row">
                  <div class="info-row-label">LETTER MAP</div>
                  <div class="info-row-val" style="color:var(--cyan);font-size:10px;letter-spacing:.05em">
                    ${results.map(r => `${r.ch}→${r.dstCh}`).join('  ')}
                  </div>
                </div>
                <div class="formula">
                  <em>Formula:</em>&nbsp; encoded_char = <strong>SUBST[plain_pos]</strong><br>
                  <em>Example:</em>&nbsp; '${results[0].ch}' is pos <strong>${results[0].srcIdx}</strong>
                  &nbsp;→&nbsp; SUBST[${results[0].srcIdx}]
                  &nbsp;→&nbsp; '<em>${results[0].dstCh}</em>'<br>
                  <span class="purple">◆ Custom substitution using a randomized mapping key.</span>
                </div>
            `;
            vis(infoPanel, true);
        }

        prevStepBtn.disabled = (step === -1);
        nextStepBtn.disabled = (step === n);
        isAnimating = false;
    }

    prevStepBtn.addEventListener('click', () => {
        if (currentStep > -1 && !isAnimating) {
            currentStep--;
            renderStep(currentStep);
        }
    });

    nextStepBtn.addEventListener('click', () => {
        if (currentStep < n && !isAnimating) {
            currentStep++;
            renderStep(currentStep);
        }
    });

    replayBtn.addEventListener('click', () => {
        if (isAnimating) return;
        currentStep = -1;
        renderStep(currentStep);
    });

    btnNext.addEventListener('click', () => {
        window.location.href = "level1.5.html";
    });

    window.onload = () => {
        buildRows();
        buildChips(raw);
        buildPairLegend();
        setTimeout(() => {
            renderStep(currentStep);
        }, 50);
    };
</script>
</body>
</html>
