<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CipherQuest | Level 2.2 | Alternating Cipher</title>
  <style>
    :root {
      --ap: #59f2ff;
      --aw: #ffdd57;
      --ag: #22c55e;
      --tm: #f4f7ff;
      --mu: #94a3b8;
      --sp: rgba(15, 23, 42, 0.78);
      --si: rgba(2, 6, 23, 0.72);
      --bs: rgba(148, 163, 184, 0.4);
      --bb: rgba(148, 163, 184, 0.55);
      --font: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      color: var(--tm);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at top, #1b243b 0%, #020617 55%);
      overflow-x: hidden;
      cursor: url('/assets/mouse.png') 4 4, auto;
    }

    /* Global cursor enforcement */
    * {
      cursor: inherit !important;
    }

    a, button, [role="button"], input, textarea, select {
      cursor: url('/assets/mouse.png') 4 4, pointer !important;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 55% 35% at 0% 100%, rgba(89, 242, 255, 0.10) 0%, transparent 70%),
        radial-gradient(ellipse 45% 30% at 100% 0%, rgba(255, 221, 87, 0.08) 0%, transparent 70%);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: repeating-linear-gradient(to bottom, transparent 0, transparent 3px,
          rgba(89, 242, 255, 0.012) 3px, rgba(89, 242, 255, 0.012) 4px);
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 780px;
      background: var(--sp);
      border: 1px solid var(--bs);
      border-radius: 18px;
      backdrop-filter: blur(14px);
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.85);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 22px;
      background: var(--si);
      border-bottom: 1px solid var(--bs);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 221, 87, 0.6);
      background: rgba(2, 6, 23, 0.3);
      color: var(--aw);
    }

    .topbar-title{font-family:'SF Mono','Fira Code',Consolas,monospace;font-size:22px;font-weight:800;text-transform:uppercase;letter-spacing:0.15em;}

    .topbar-sub {
      font-size: 11px;
      color: var(--mu);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .live-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ag);
    }

    .live-tag::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ag);
      box-shadow: 0 0 8px var(--ag);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .35
      }
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      padding: 11px 22px;
      background: rgba(2, 6, 23, 0.45);
      border-bottom: 1px solid var(--bs);
    }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ctrl-lbl {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--mu);
    }

    .shift-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--si);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .shift-btn.sx {
      border: 1px solid rgba(89, 242, 255, 0.3);
      color: var(--ap);
    }

    .shift-btn.sy {
      border: 1px solid rgba(255, 221, 87, 0.3);
      color: var(--aw);
    }

    .shift-btn:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .shift-num {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 17px;
      font-weight: 700;
      min-width: 42px;
      text-align: center;
    }

    .shift-num.sx {
      color: var(--ap);
    }

    .shift-num.sy {
      color: var(--aw);
    }

    .divider-dot {
      color: rgba(148, 163, 184, 0.3);
      font-size: 20px;
    }

    .stage {
      padding: 22px 22px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      position: relative;
      min-height: 520px;
    }

    .stage::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(to bottom, transparent 0, transparent 3px,
          rgba(89, 242, 255, 0.008) 3px, rgba(89, 242, 255, 0.008) 4px);
    }

    .status {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--ap);
      min-height: 18px;
      align-self: flex-start;
      position: relative;
      z-index: 2;
    }

    .blink {
      animation: blink .9s step-end infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    .word-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      position: relative;
      z-index: 2;
    }

    .wchip {
      width: 72px;
      height: 80px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: var(--si);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      position: relative;
      overflow: hidden;
      transition: all 0.35s;
      opacity: 0;
    }

    .wchip .wletter {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 32px;
      font-weight: 700;
      color: var(--tm);
      transition: all .35s;
    }

    .wchip .widx {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--mu);
      transition: color .35s;
    }

    .wchip .wtrack {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: transparent;
      transition: all .35s;
      position: absolute;
      bottom: 7px;
    }

    .wchip.active-x {
      border-color: var(--ap);
      box-shadow: 0 0 24px rgba(89, 242, 255, 0.55), inset 0 0 14px rgba(89, 242, 255, 0.08);
    }

    .wchip.active-x .wletter {
      color: var(--ap);
      text-shadow: 0 0 16px rgba(89, 242, 255, 0.9);
    }

    .wchip.active-x .widx {
      color: rgba(89, 242, 255, 0.6);
    }

    .wchip.active-x .wtrack {
      color: rgba(89, 242, 255, 0.7);
    }

    .wchip.active-x::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(89, 242, 255, .1) 60%, transparent 80%);
      animation: shimmer 1s linear infinite;
    }

    .wchip.active-y {
      border-color: var(--aw);
      box-shadow: 0 0 24px rgba(255, 221, 87, 0.55), inset 0 0 14px rgba(255, 221, 87, 0.08);
    }

    .wchip.active-y .wletter {
      color: var(--aw);
      text-shadow: 0 0 16px rgba(255, 221, 87, 0.9);
    }

    .wchip.active-y .widx {
      color: rgba(255, 221, 87, 0.6);
    }

    .wchip.active-y .wtrack {
      color: rgba(255, 221, 87, 0.7);
    }

    .wchip.active-y::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255, 221, 87, .1) 60%, transparent 80%);
      animation: shimmer 1s linear infinite;
    }

    @keyframes shimmer {
      from {
        transform: translateX(-120%)
      }

      to {
        transform: translateX(200%)
      }
    }

    .wchip.enc-x {
      border-color: rgba(89, 242, 255, .4);
    }

    .wchip.enc-x .wletter {
      color: rgba(89, 242, 255, .65);
    }

    .wchip.enc-y {
      border-color: rgba(255, 221, 87, .4);
    }

    .wchip.enc-y .wletter {
      color: rgba(255, 221, 87, .65);
    }

    .beat-meter {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .beat-block {
      flex: 1;
      height: 46px;
      border-radius: 10px;
      background: var(--si);
      border: 1px solid rgba(148, 163, 184, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
    }

    .beat-block.on-x {
      border-color: rgba(89, 242, 255, 0.6);
      background: rgba(89, 242, 255, 0.07);
      box-shadow: 0 0 18px rgba(89, 242, 255, 0.3);
    }

    .beat-block.on-y {
      border-color: rgba(255, 221, 87, 0.6);
      background: rgba(255, 221, 87, 0.07);
      box-shadow: 0 0 18px rgba(255, 221, 87, 0.3);
    }

    .beat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(148, 163, 184, 0.2);
      transition: all .3s;
    }

    .beat-block.on-x .beat-dot {
      background: var(--ap);
      box-shadow: 0 0 8px var(--ap);
    }

    .beat-block.on-y .beat-dot {
      background: var(--aw);
      box-shadow: 0 0 8px var(--aw);
    }

    .beat-text {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--mu);
      transition: color .3s;
    }

    .beat-block.on-x .beat-text {
      color: var(--ap);
    }

    .beat-block.on-y .beat-text {
      color: var(--aw);
    }

    .beat-shift {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 16px;
      font-weight: 700;
      color: var(--mu);
      transition: all .3s;
    }

    .beat-block.on-x .beat-shift {
      color: var(--ap);
    }

    .beat-block.on-y .beat-shift {
      color: var(--aw);
    }

    .beat-sep {
      font-size: 22px;
      color: rgba(148, 163, 184, 0.2);
      transition: all .35s;
    }

    .beat-sep.fx {
      color: var(--ap);
      text-shadow: 0 0 14px rgba(89, 242, 255, .8);
    }

    .beat-sep.fy {
      color: var(--aw);
      text-shadow: 0 0 14px rgba(255, 221, 87, .8);
    }

    .tracks {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .track-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .track-lbl {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      width: 50px;
      flex-shrink: 0;
      text-align: right;
    }

    .track-lbl.lx {
      color: var(--ap);
    }

    .track-lbl.ly {
      color: var(--aw);
    }

    .tape-outer {
      flex: 1;
      overflow: hidden;
      border-radius: 8px;
      height: 48px;
      background: var(--si);
      border: 1px solid rgba(148, 163, 184, 0.15);
      position: relative;
      transition: border-color .3s, box-shadow .3s;
    }

    .tape-outer.atx {
      border-color: rgba(89, 242, 255, 0.5);
      box-shadow: 0 0 14px rgba(89, 242, 255, 0.2);
    }

    .tape-outer.aty {
      border-color: rgba(255, 221, 87, 0.5);
      box-shadow: 0 0 14px rgba(255, 221, 87, 0.2);
    }

    .tape-outer::before,
    .tape-outer::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 48px;
      z-index: 2;
      pointer-events: none;
    }

    .tape-outer::before {
      left: 0;
      background: linear-gradient(to right, var(--si), transparent);
    }

    .tape-outer::after {
      right: 0;
      background: linear-gradient(to left, var(--si), transparent);
    }

    .reticle {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      z-index: 3;
      pointer-events: none;
    }

    .rx {
      border-left: 1px solid rgba(89, 242, 255, 0.65);
      border-right: 1px solid rgba(89, 242, 255, 0.65);
      background: rgba(89, 242, 255, 0.05);
    }

    .ry {
      border-left: 1px solid rgba(255, 221, 87, 0.65);
      border-right: 1px solid rgba(255, 221, 87, 0.65);
      background: rgba(255, 221, 87, 0.05);
    }

    .reticle::before,
    .reticle::after {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }

    .rx::before,
    .rx::after {
      background: var(--ap);
      box-shadow: 0 0 8px var(--ap);
    }

    .ry::before,
    .ry::after {
      background: var(--aw);
      box-shadow: 0 0 8px var(--aw);
    }

    .reticle::before {
      top: -2px;
    }

    .reticle::after {
      bottom: -2px;
    }

    .tape-inner {
      display: flex;
      align-items: center;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      will-change: transform;
    }

    .tcell {
      width: 40px;
      height: 48px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 14px;
      color: var(--mu);
      transition: color .2s;
    }

    .tcell .tp {
      font-size: 7px;
      color: rgba(148, 163, 184, 0.35);
    }

    .tsrc-x {
      color: var(--ap);
      text-shadow: 0 0 12px rgba(89, 242, 255, .8);
    }

    .tsrc-y {
      color: var(--aw);
      text-shadow: 0 0 12px rgba(255, 221, 87, .8);
    }

    .tdst-x {
      color: var(--ap);
      text-shadow: 0 0 16px rgba(89, 242, 255, 1);
      font-weight: 700;
    }

    .tdst-y {
      color: var(--aw);
      text-shadow: 0 0 16px rgba(255, 221, 87, 1);
      font-weight: 700;
    }

    .output-wrap {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .out-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--mu);
    }

    .opill {
      font-size: 10px;
      padding: 2px 9px;
      border-radius: 999px;
      border: 1px solid;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .opill.px {
      color: rgba(89, 242, 255, .8);
      border-color: rgba(89, 242, 255, .3);
      background: rgba(89, 242, 255, .06);
    }

    .opill.py {
      color: rgba(255, 221, 87, .8);
      border-color: rgba(255, 221, 87, .3);
      background: rgba(255, 221, 87, .06);
    }

    .opill.pf {
      color: rgba(34, 197, 94, .85);
      border-color: rgba(34, 197, 94, .35);
      background: rgba(34, 197, 94, .06);
    }

    .out-chips {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .ochip {
      width: 72px;
      height: 80px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.12);
      background: var(--si);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 32px;
      color: transparent;
      transition: all .4s;
    }

    .ochip .oidx {
      font-size: 9px;
      color: var(--mu);
    }

    .ochip.lx {
      color: var(--ap);
      border-color: rgba(89, 242, 255, .5);
      box-shadow: 0 0 20px rgba(89, 242, 255, .35);
      animation: landIn .5s cubic-bezier(.34, 1.56, .64, 1);
    }

    .ochip.ly {
      color: var(--aw);
      border-color: rgba(255, 221, 87, .5);
      box-shadow: 0 0 20px rgba(255, 221, 87, .35);
      animation: landIn .5s cubic-bezier(.34, 1.56, .64, 1);
    }

    @keyframes landIn {
      from {
        transform: scale(.6) translateY(-10px);
        opacity: 0
      }

      to {
        transform: scale(1) translateY(0);
        opacity: 1
      }
    }

    .map-row {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .5s, transform .5s;
    }

    .map-row.vis {
      opacity: 1;
      transform: translateY(0);
    }

    .map-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      border-radius: 999px;
      background: var(--si);
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
    }

    .map-pill.mx {
      border: 1px solid rgba(89, 242, 255, .3);
    }

    .map-pill.my {
      border: 1px solid rgba(255, 221, 87, .3);
    }

    .mp-from {
      color: var(--mu);
    }

    .mp-arr {
      color: rgba(148, 163, 184, 0.25);
    }

    .mp-to-x {
      color: var(--ap);
      font-weight: 700;
    }

    .mp-to-y {
      color: var(--aw);
      font-weight: 700;
    }

    .mp-shift {
      font-size: 9px;
      color: var(--mu);
      margin-left: 2px;
    }

    .info-panel {
      position: relative;
      z-index: 2;
      width: 100%;
      background: var(--si);
      border: 1px solid var(--bs);
      border-radius: 12px;
      padding: 14px 18px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .5s, transform .5s;
    }

    .info-panel.vis {
      opacity: 1;
      transform: translateY(0);
    }

    .info-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--aw);
      margin-bottom: 10px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .irow {
      background: rgba(2, 6, 23, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .irow-lbl {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--mu);
      margin-bottom: 4px;
    }

    .irow-val {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 13px;
      font-weight: 700;
    }

    .formula {
      grid-column: 1/-1;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      color: var(--mu);
      line-height: 1.85;
      background: rgba(2, 6, 23, 0.75);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 8px;
      padding: 12px 14px;
    }

    .fx {
      color: var(--ap);
    }

    .fy {
      color: var(--aw);
    }

    .fg {
      color: var(--ag);
    }

    .fm {
      color: var(--tm);
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 22px;
      background: var(--si);
      border-top: 1px solid var(--bs);
    }

    .foot-btn {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 7px 16px;
      border-radius: 999px;
      border: 1px solid var(--bs);
      background: transparent;
      color: var(--mu);
      cursor: pointer;
      transition: all 0.2s;
    }

    .foot-btn:hover {
      border-color: var(--bb);
      color: var(--tm);
    }

    .foot-btn.primary {
      color: var(--ap);
      border-color: rgba(89, 242, 255, .4);
      background: rgba(89, 242, 255, .05);
    }

    .foot-btn.primary:hover {
      background: rgba(89, 242, 255, .1);
      box-shadow: 0 0 14px rgba(89, 242, 255, .25);
    }

    .replay-tag {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--mu);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .rtick {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(148, 163, 184, 0.3);
      animation: rtick 1s step-end infinite;
    }

    @keyframes rtick {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .2
      }
    }
    .go-btn {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(89, 242, 255, 0.4);
      background: rgba(89, 242, 255, 0.1);
      color: var(--ap);
      cursor: pointer;
      margin-left: 12px;
      transition: all 0.2s;
    }
    .go-btn:hover {
      background: rgba(89, 242, 255, 0.2);
      box-shadow: 0 0 10px rgba(89, 242, 255, 0.3);
    }
  
        #speedDown,
        #speedUp {
            width: 28px;
            height: 26px;
            display: inline-grid;
            place-items: center;
            padding: 0;
            border: 1px solid rgba(89, 242, 255, 0.36);
            border-radius: 999px;
            background: rgba(89, 242, 255, 0.08);
            color: #59f2ff;
            font-size: 14px;
            font-weight: 900;
            line-height: 1;
            cursor: pointer;
            transition: background .18s ease, box-shadow .18s ease, transform .18s ease;
        }

        #speedDown:hover,
        #speedUp:hover {
            background: rgba(89, 242, 255, 0.16);
            box-shadow: 0 0 14px rgba(89, 242, 255, 0.24);
            transform: translateY(-1px);
        }

        #speedDisplay {
            min-width: 44px;
            color: #dffbff;
            font-variant-numeric: tabular-nums;
            text-align: center;
            font-family: "SF Mono", "Fira Code", Consolas, monospace;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .08em;
        }

        #btn-play,
        #btn-step,
        #btn-next,
        #replay,
        #replayBtn,
        #replayNow,
        #nextBtn,
        .btn,
        .foot-btn {
            min-height: 34px;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: .1em;
            font-size: 11px;
            font-weight: 800;
        }

        #btn-play,
        #replay,
        #replayBtn,
        #replayNow {
            border: 1px solid rgba(89, 242, 255, 0.46);
            background: rgba(89, 242, 255, 0.10);
            color: #59f2ff;
        }

        #btn-next,
        #btn-step,
        #nextBtn,
        .foot-btn.primary {
            border: 1px solid rgba(255, 221, 87, 0.46);
            background: rgba(255, 221, 87, 0.10);
            color: #ffdd57;
        }

        #btn-play:hover,
        #btn-step:hover,
        #btn-next:hover,
        #replay:hover,
        #replayBtn:hover,
        #replayNow:hover,
        #nextBtn:hover {
            box-shadow: 0 0 16px rgba(89, 242, 255, 0.22);
        }

    .step-btn {
      border-radius: 6px !important;
      background: rgba(89, 242, 255, 0.1) !important;
      border: 1px solid rgba(89, 242, 255, 0.4) !important;
      color: #59f2ff !important;
    }
    .step-btn:hover:not(:disabled) {
      background: rgba(89, 242, 255, 0.2) !important;
      box-shadow: 0 0 10px rgba(89, 242, 255, 0.3) !important;
    }
    .step-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .next-cipher-btn {
      background: #ffdd57 !important;
      color: #000 !important;
      border: none !important;
      border-radius: 999px !important;
      font-weight: 800 !important;
    }
    .next-cipher-btn:hover {
      box-shadow: 0 0 16px rgba(255, 221, 87, 0.6) !important;
    }
    
    
    /* -- PERFECTED BUTTON STYLES -- */
    .foot-btn, .step-btn, .next-cipher-btn, .go-btn, #goBtn, #replayBtn, #btn-next, #prevStep, #nextStep, #startBtn, #nextBtn {
        padding: 8px 16px !important;
        border-radius: 8px !important;
        font-size: 12px !important;
        font-weight: 700 !important;
        text-transform: uppercase !important;
        letter-spacing: 0.1em !important;
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 8px !important;
        clip-path: none !important;
        min-height: auto !important;
        box-sizing: border-box !important;
        cursor: pointer;
        transition: all 0.2s ease !important;
        font-family: inherit !important;
    }

    /* NEXT STEP & PREV STEP */
    #prevStep, #nextStep, .step-btn:not(#goBtn):not(#startBtn):not(.go-btn) {
        background: #59f2ff !important;
        color: #000 !important;
        border: 1px solid #59f2ff !important;
        opacity: 1 !important;
    }

    #prevStep:disabled, #nextStep:disabled, .step-btn:disabled {
        background: rgba(89, 242, 255, 0.4) !important;
        color: rgba(0, 0, 0, 0.7) !important;
        border: 1px solid transparent !important;
        cursor: not-allowed !important;
        box-shadow: none !important;
    }

    #prevStep:hover:not(:disabled), #nextStep:hover:not(:disabled), .step-btn:hover:not(:disabled) {
        box-shadow: 0 0 14px rgba(89, 242, 255, 0.4) !important;
    }

    /* RESTART & START */
    #replayBtn, #goBtn, #startBtn, .go-btn, #replay, #replayNow {
        background: #1e293b !important;
        color: #cbd5e1 !important;
        border: 1px solid #334155 !important;
    }
    
    #replayBtn:hover:not(:disabled), #goBtn:hover:not(:disabled), #startBtn:hover:not(:disabled), .go-btn:hover:not(:disabled), #replay:hover:not(:disabled), #replayNow:hover:not(:disabled) {
        background: #334155 !important;
        color: #f1f5f9 !important;
    }

    /* NEXT CIPHER */
    #btn-next, .next-cipher-btn, #nextBtn {
        background: #ffdd57 !important;
        color: #000 !important;
        border: 1px solid #ffdd57 !important;
    }
    #btn-next:hover, .next-cipher-btn:hover, #nextBtn:hover {
        box-shadow: 0 0 16px rgba(255, 221, 87, 0.5) !important;
    }

    </style>
    <script src="global_controls.js"></script>
</head>

<body>
  <div class="card">
    <div class="topbar">
      <div class="topbar-left">
        <span class="badge">CH 02</span>
        <div>
          <div class="topbar-title">Alternating Cipher</div>
          <div class="topbar-sub">Level 2 - Even +X · Odd +Y</div>
        </div>
      </div>
      <div class="live-tag">Auto Demo</div>
    </div>
    <div class="controls">
      <div class="ctrl-group">
        <span class="ctrl-lbl">Shift Even Pos</span>
        <button class="shift-btn sx" id="xDown">−</button>
        <div class="shift-num sx" id="xVal">+3</div>
        <button class="shift-btn sx" id="xUp">+</button>
      </div>
      <div class="divider-dot">·</div>
      <div class="ctrl-group">
        <span class="ctrl-lbl">Shift Odd Pos</span>
        <button class="shift-btn sy" id="yDown">−</button>
        <div class="shift-num sy" id="yVal">−2</div>
        <button class="shift-btn sy" id="yUp">+</button>
      </div>
      <div style="margin-left:auto; display:flex; align-items:center; gap:12px;">
        <span class="ctrl-lbl" style="color:#59f2ff; text-transform:none; font-size:11px;">Select key and click start to proceed →</span>
        <button class="go-btn step-btn" id="goBtn" style="padding:7px 22px;">Start</button>
      </div>
    </div>
    <div class="stage">
      <div class="status"><span id="statusTxt">Initializing…</span><span class="blink"> ▌</span></div>
      <div class="word-row" id="wordRow"></div>
      <div class="beat-meter">
        <div class="beat-block" id="bx">
          <div class="beat-dot"></div>
          <div class="beat-text">Even </div>
          <div class="beat-shift" id="bxv">+3</div>
        </div>
        <div class="beat-sep" id="bsep">⟷</div>
        <div class="beat-block" id="by">
          <div class="beat-dot"></div>
          <div class="beat-text">Odd </div>
          <div class="beat-shift" id="byv">−2</div>
        </div>
      </div>
      <div class="tracks">
        <div class="track-row">
          <span class="track-lbl lx">Track X</span>
          <div class="tape-outer" id="toX">
            <div class="reticle rx"></div>
            <div class="tape-inner" id="tiX"></div>
          </div>
        </div>
        <div class="track-row">
          <span class="track-lbl ly">Track Y</span>
          <div class="tape-outer" id="toY">
            <div class="reticle ry"></div>
            <div class="tape-inner" id="tiY"></div>
          </div>
        </div>
      </div>
      <div class="output-wrap">
        <div class="out-header">
          <span>Output</span>
          <span class="opill px">Even</span>
          <span style="color:var(--mu);font-size:11px">alternates with</span>
          <span class="opill py">Odd</span>
          <span style="color:var(--mu);font-size:11px">=</span>
          <span class="opill pf">encoded</span>
        </div>
        <div class="out-chips" id="outChips"></div>
      </div>
      <div class="map-row" id="mapRow"></div>
      <div class="info-panel" id="infoPanel">
        <div class="info-title">↳ Cipher Breakdown</div>
        <div class="info-grid" id="infoGrid"></div>
      </div>
    </div>
    <div class="footer">
      <div style="display:flex; gap:12px;">
        <button class="foot-btn step-btn" id="prevStep" disabled>Prev Step</button>
        <button class="foot-btn step-btn" id="nextStep" disabled>Next Step</button>
        <button class="foot-btn" id="replayBtn">Restart</button>
      </div>
      <button class="foot-btn next-cipher-btn" id="btn-next">Next Cipher →</button>
    </div>
  </div>
  <div id="flyer"
    style="position:fixed;z-index:400;pointer-events:none;width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'SF Mono','Fira Code',monospace;font-size:20px;font-weight:700;background:rgba(2,6,23,0.95);opacity:0;">
  </div>
  <script>
    const ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ', WORD = 'CIPHER', TW = 40;
    let shiftX = 3, shiftY = -2;
    let currentStep = -1, n = 0;
    let result = [], encoded = '';
    
    const $ = id => document.getElementById(id);
    const xDown = $('xDown'), xUp = $('xUp'), xVal = $('xVal');
    const yDown = $('yDown'), yUp = $('yUp'), yVal = $('yVal');
    const bx = $('bx'), by = $('by'), bsep = $('bsep'), bxv = $('bxv'), byv = $('byv');
    const toX = $('toX'), toY = $('toY'), tiX = $('tiX'), tiY = $('tiY');
    const wordRow = $('wordRow'), outChips = $('outChips'), mapRow = $('mapRow');
    const infoPanel = $('infoPanel'), infoGrid = $('infoGrid'), statusTxt = $('statusTxt');
    const flyer = $('flyer'), replayBtn = $('replayBtn'), goBtn = $('goBtn');
    const prevStepBtn = $('prevStep'), nextStepBtn = $('nextStep'), btnNext = $('btn-next');
    const vis = (el, on = true) => el.classList.toggle('vis', on);
    const setStatus = t => statusTxt.textContent = t;

    function updateDisplays() {
      if (xVal) xVal.textContent = (shiftX >= 0 ? '+' : '') + shiftX;
      if (yVal) yVal.textContent = (shiftY >= 0 ? '+' : '') + shiftY;
      if (bxv) bxv.textContent = (shiftX >= 0 ? '+' : '') + shiftX;
      if (byv) byv.textContent = (shiftY >= 0 ? '+' : '') + shiftY;
    }
    
    function mkShift(axis, dir) {
      return () => {
        if (currentStep >= 0) return;
        if (axis === 'x') { if (dir > 0 && shiftX < 25) shiftX++; else if (dir < 0 && shiftX > -25) shiftX--; }
        else { if (dir > 0 && shiftY < 25) shiftY++; else if (dir < 0 && shiftY > -25) shiftY--; }
        updateDisplays();
      };
    }
    
    if (xDown) xDown.addEventListener('click', mkShift('x', -1));
    if (xUp) xUp.addEventListener('click', mkShift('x', 1));
    if (yDown) yDown.addEventListener('click', mkShift('y', -1));
    if (yUp) yUp.addEventListener('click', mkShift('y', 1));

    function buildTape(inner) {
      if (!inner) return;
      inner.innerHTML = '';
      for (let rep = 0; rep < 3; rep++)
        for (let i = 0; i < 26; i++) {
          const c = document.createElement('div');
          c.className = 'tcell'; c.id = inner.id + '-' + (rep * 26 + i);
          c.innerHTML = `<span>${ALPHA[i]}</span><span class="tp">${i}</span>`;
          inner.appendChild(c);
        }
    }
    
    function setTapePos(outer, inner, idx) {
      if (!outer || !inner) return;
      const w = outer.offsetWidth || 500;
      const x = w / 2 - idx * TW - TW / 2;
      inner.style.transition = 'none';
      inner.style.transform = `translateX(${x}px)`;
    }
    
    function clearHL(inner) { 
       if (!inner) return;
       inner.querySelectorAll('.tcell').forEach(c => c.classList.remove('tsrc-x', 'tsrc-y', 'tdst-x', 'tdst-y')); 
    }

    function buildWordChips() {
      if (!wordRow) return;
      wordRow.innerHTML = '';
      WORD.split('').forEach((ch, i) => {
        const c = document.createElement('div'); c.className = 'wchip'; c.id = 'wc-' + i;
        c.innerHTML = `<span class="wletter" id="wl-${i}">${ch}</span><span class="widx">[${i}] ${i % 2 === 0 ? 'even' : 'odd'}</span>`;
        wordRow.appendChild(c);
      });
    }
    
    function buildOutChips() {
      if (!outChips) return;
      outChips.innerHTML = '';
      WORD.split('').forEach((_, i) => {
        const c = document.createElement('div'); c.className = 'ochip'; c.id = 'oc-' + i;
        c.innerHTML = `<span id="ocv-${i}"> </span><span class="oidx">[${i}]</span>`;
        outChips.appendChild(c);
      });
    }

    function resetDemo() {
      n = WORD.length;
      result = WORD.split('').map((ch, i) => {
        const s = i % 2 === 0 ? shiftX : shiftY, src = ALPHA.indexOf(ch), dst = ((src + s) % 26 + 26) % 26;
        return { ch, src, dst, enc: ALPHA[dst], isX: i % 2 === 0, s };
      });
      encoded = result.map(r => r.enc).join('');

      vis(infoPanel, false); vis(mapRow, false);
      if (infoGrid) infoGrid.innerHTML = ''; 
      if (mapRow) mapRow.innerHTML = ''; 
      if (flyer) flyer.style.opacity = '0';
      if (bx) bx.className = 'beat-block'; 
      if (by) by.className = 'beat-block'; 
      if (bsep) bsep.className = 'beat-sep';
      if (toX) toX.classList.remove('atx'); 
      if (toY) toY.classList.remove('aty');

      buildTape(tiX); buildTape(tiY);
      setTapePos(toX, tiX, 26); setTapePos(toY, tiY, 26);
      buildWordChips(); buildOutChips(); updateDisplays();

      setStatus('CIPHER · loaded onto encoder…');
      
      for (let i = 0; i < n; i++) {
        const wc = document.getElementById('wc-' + i);
        if (wc) {
          wc.style.opacity = '1';
          wc.style.transform = 'translateY(0)';
        }
      }
      
      currentStep = -1;
      updateButtons();
    }
    
    function updateButtons() {
      if (prevStepBtn) prevStepBtn.disabled = currentStep < 0;
      if (nextStepBtn) nextStepBtn.disabled = currentStep >= n;
      
      if(currentStep >= 0) {
        if (xDown) xDown.disabled = true;
        if (xUp) xUp.disabled = true;
        if (yDown) yDown.disabled = true;
        if (yUp) yUp.disabled = true;
      } else {
        if (xDown) xDown.disabled = false;
        if (xUp) xUp.disabled = false;
        if (yDown) yDown.disabled = false;
        if (yUp) yUp.disabled = false;
      }
    }

    function renderStep(step) {
      if (step < -1) return;
      if (step > n) return;
      
      currentStep = step;
      updateButtons();
      
      // Reset all visuals first
      clearHL(tiX); clearHL(tiY);
      for(let i=0; i<n; i++) {
         const wc = document.getElementById('wc-' + i);
         if (wc) wc.classList.remove('active-x', 'active-y', 'enc-x', 'enc-y');
         const oc = document.getElementById('oc-' + i);
         if (oc) oc.classList.remove('lx', 'ly');
         const ocv = document.getElementById('ocv-' + i);
         if (ocv) ocv.textContent = ' ';
         const wl = document.getElementById('wl-' + i);
         if (wl) wl.textContent = result[i].ch;
      }
      if (toX) toX.classList.remove('atx');
      if (toY) toY.classList.remove('aty');
      if (bx) bx.className = 'beat-block';
      if (by) by.className = 'beat-block';
      if (bsep) bsep.className = 'beat-sep';
      
        if (currentStep === -1) {
            setStatus('CIPHER · loaded onto encoder…');
            setTapePos(toX, tiX, 26);
            setTapePos(toY, tiY, 26);
            vis(infoPanel, false); vis(mapRow, false);
            if (prevStepBtn) prevStepBtn.disabled = true;
            if (nextStepBtn) nextStepBtn.disabled = true;
            return;
        }
      
      if (currentStep === n) {
          setStatus(`Complete · CIPHER → ${encoded}`);
          vis(mapRow, true);
          if (mapRow) {
             mapRow.innerHTML = '';
             result.forEach(r => {
                const p = document.createElement('div'); p.className = `map-pill ${r.isX ? 'mx' : 'my'}`;
                p.innerHTML = `<span class="mp-from">${r.ch}</span><span class="mp-arr">→</span><span class="${r.isX ? 'mp-to-x' : 'mp-to-y'}">${r.enc}</span><span class="mp-shift">${r.s >= 0 ? '+' : ''}${r.s}</span>`;
                mapRow.appendChild(p);
             });
          }
          if (infoGrid) {
              infoGrid.innerHTML = `
                <div class="irow"><div class="irow-lbl">Input</div><div class="irow-val fm">CIPHER</div></div>
                <div class="irow"><div class="irow-lbl">Output</div><div class="irow-val fg">${encoded}</div></div>
                <div class="irow"><div class="irow-lbl">Shift X · even</div><div class="irow-val fx">${shiftX >= 0 ? '+' : ''}${shiftX} steps</div></div>
                <div class="irow"><div class="irow-lbl">Shift Y · odd</div><div class="irow-val fy">${shiftY >= 0 ? '+' : ''}${shiftY} steps</div></div>
                <div class="formula">
            <span class="fm">Rule :</span>  even [0,2,4] → Track <span class="fx">X (${shiftX >= 0 ? '+' : ''}${shiftX})</span>   ·   odd [1,3,5] → Track <span class="fy">Y (${shiftY >= 0 ? '+' : ''}${shiftY})</span>
            
            <span class="fm">Same letter, different position = different output.</span>
            <span class="fg">Why harder?</span> <span class="fm">Two keys needed. Knowing just one shift
            won't crack it — you need both X and Y to decode.</span></div>`;
          }
          vis(infoPanel, true);
          
          for (let i=0; i<n; i++) {
             const r = result[i];
             const oc = document.getElementById('oc-' + i);
             const ocv = document.getElementById('ocv-' + i);
             if (ocv) ocv.textContent = r.enc;
             if (oc) oc.classList.add(r.isX ? 'lx' : 'ly');
             const wc = document.getElementById('wc-' + i);
             if (wc) wc.classList.add(r.isX ? 'enc-x' : 'enc-y');
             const wl = document.getElementById('wl-' + i);
             if (wl) wl.textContent = r.enc;
          }
          return;
      }
      
      // Render intermediate steps
      vis(infoPanel, false); vis(mapRow, false);
      for(let i=0; i <= currentStep; i++) {
          const r = result[i];
          const oc = document.getElementById('oc-' + i);
          const ocv = document.getElementById('ocv-' + i);
          const wc = document.getElementById('wc-' + i);
          const wl = document.getElementById('wl-' + i);
          
          if (i < currentStep) {
              if (ocv) ocv.textContent = r.enc;
              if (oc) oc.classList.add(r.isX ? 'lx' : 'ly');
              if (wc) wc.classList.add(r.isX ? 'enc-x' : 'enc-y');
              if (wl) wl.textContent = r.enc;
          } else if (i === currentStep) {
              const outer = r.isX ? toX : toY, inner = r.isX ? tiX : tiY;
              if (bx) bx.className = r.isX ? 'beat-block on-x' : 'beat-block';
              if (by) by.className = r.isX ? 'beat-block' : 'beat-block on-y';
              if (bsep) bsep.className = r.isX ? 'beat-sep fx' : 'beat-sep fy';
              if (outer) outer.classList.add(r.isX ? 'atx' : 'aty');
              if (wc) wc.classList.add(r.isX ? 'active-x' : 'active-y');
              setStatus(`[${i}] "${r.ch}" pos ${r.src} · ${r.isX ? 'Track X' : 'Track Y'} · shift ${r.s >= 0 ? '+' : ''}${r.s} → "${r.enc}"`);
              
              let tapeDst = 26 + r.src + r.s;
              setTapePos(outer, inner, tapeDst);
              const dstCell = inner.querySelector('#' + inner.id + '-' + tapeDst);
              if (dstCell) dstCell.classList.add(r.isX ? 'tdst-x' : 'tdst-y');
              
              if (ocv) ocv.textContent = r.enc;
              if (oc) oc.classList.add(r.isX ? 'lx' : 'ly');
              if (wl) wl.textContent = r.enc;
          }
      }
    }

    if (goBtn) {
       goBtn.addEventListener('click', () => {
          if (currentStep === -1) {
             goBtn.disabled = true;
             renderStep(0);
          }
       });
    }
    if (replayBtn) {
       replayBtn.addEventListener('click', () => {
          if (goBtn) goBtn.disabled = false;
          resetDemo();
       });
    }
    
    if (prevStepBtn) prevStepBtn.addEventListener('click', () => { if(currentStep > -1) renderStep(currentStep - 1); });
    if (nextStepBtn) nextStepBtn.addEventListener('click', () => { if(currentStep > -1) renderStep(currentStep + 1); });
    
    if (btnNext) {
      btnNext.addEventListener('click', () => {
        window.location.href = "level2.3.html";
      });
    }

    resetDemo();
</script>
</body>

</html>
