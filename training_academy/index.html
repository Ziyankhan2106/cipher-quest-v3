<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherQuest | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600&family=Fira+Code:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --current-theme-color: #00e5ff;
            --theme-color-rgb: 0, 229, 255;
            --bg-base: #050505;
        }

        body {
            background-color: var(--bg-base);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            cursor: url('/assets/mouse.png') 4 4, auto;
        }

        /* Global cursor enforcement */
        * {
            cursor: url('/assets/mouse.png') 4 4, auto !important;
        }

        a, button, [role="button"], input, textarea, select {
            cursor: url('/assets/mouse.png') 4 4, pointer !important;
        }

        .font-display { font-family: 'Orbitron', sans-serif; }
        .font-mono { font-family: 'Fira Code', monospace; }

        /* Background Effects */
        .bg-texture {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('background.jpg'); /* Gracefully fallback to dark color if missing */
            background-size: cover;
            background-position: center;
            opacity: 0.15;
            mix-blend-mode: luminosity;
            z-index: -3;
            pointer-events: none;
        }
        
        .bg-nebula {
            position: fixed;
            width: 600px; height: 600px;
            border-radius: 50%;
            background-color: var(--current-theme-color);
            filter: blur(150px);
            mix-blend-mode: screen;
            opacity: 0.2;
            z-index: -2;
            pointer-events: none;
        }

        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            z-index: -1;
            pointer-events: none;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }

        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, transparent 50%, #050505 150%);
            z-index: -1;
            pointer-events: none;
        }

        /* Node Map Layout */
        .node-map-container {
            padding: 4rem 2rem;
            position: relative;
            z-index: 10;
        }

        .sector-title {
            position: relative;
            margin-bottom: 2rem;
        }
        
        .sector-bg-number {
            position: absolute;
            top: -2rem;
            left: -1rem;
            font-size: 8rem;
            color: rgba(255,255,255,0.03);
            z-index: -1;
            pointer-events: none;
            line-height: 1;
        }

        /* Card Styles */
        .mission-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1.5rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 4px 20px rgba(0,0,0,0.5);
        }

        .mission-card:hover {
            transform: translateY(-8px);
            border-color: var(--current-theme-color);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 10px 30px rgba(0, 229, 255, 0.2);
        }

        .mission-accent-line {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background-color: var(--current-theme-color);
            width: 0;
            transition: width 0.4s ease;
        }

        .mission-card:hover .mission-accent-line {
            width: 100%;
        }

        /* Iframe Overlay */
        #iframe-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #iframe-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Screen Flash */
        #screen-flash {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--current-theme-color);
            mix-blend-mode: overlay;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
        }
        
        #screen-flash.flash {
            animation: flashAnim 0.6s ease-out;
        }
        
        @keyframes flashAnim {
            0% { opacity: 0.8; }
            100% { opacity: 0; }
        }


        iframe {
            flex: 1;
            width: 100%;
            border: none;
            border-top: 1px solid rgba(0, 229, 255, 0.3);
            margin-top: 70px;
            background: transparent;
        }
    </style>
</head>
<body>

    <!-- Environment -->
    <div class="fixed inset-0 z-[-1] bg-[#050505] overflow-hidden pointer-events-none">
        <div class="absolute -top-[20%] -left-[10%] w-[60vw] h-[60vw] rounded-full opacity-20 blur-[120px] bg-[#00f2ff]"></div>
        <div class="absolute -bottom-[20%] -right-[10%] w-[60vw] h-[60vw] rounded-full opacity-20 blur-[120px] bg-[#00f2ff]"></div>
    </div>

    <div class="max-w-7xl mx-auto node-map-container" id="sectors-container">
        <!-- Content injected by JS -->
    </div>

    <!-- Iframe Overlay -->
    <div id="iframe-overlay">
        <button id="close-btn" class="absolute top-0 left-0 w-28 h-28 bg-[#00f2ff] hover:bg-white transition-colors cursor-pointer group z-[10001] flex items-start justify-start pl-6 pt-6 shadow-[0_0_30px_#00f2ff] outline-none border-none" style="clip-path: polygon(0 0, 100% 0, 0 100%);">
            <div class="w-8 h-8 flex items-center justify-center">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="stroke-black group-hover:stroke-[#00f2ff] group-hover:-translate-x-1 transition-transform">
                    <path d="m15 18-6-6 6-6"/>
                </svg>
            </div>
        </button>
        <iframe id="level-frame" src=""></iframe>
    </div>

    <!-- Screen Flash -->
    <div id="screen-flash"></div>

    <!-- Boot Loader -->
    <div id="boot-loader" class="fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center pointer-events-auto transition-opacity duration-200">
        <div class="flex flex-col items-center gap-6">
            <h2 class="text-[#00f2ff] font-mono text-xl md:text-2xl tracking-[0.4em] font-bold uppercase animate-pulse">
                Booting Up
            </h2>
            <div class="w-64 md:w-80 h-2 bg-white/10" style="transform: skewX(-20deg);">
                <div class="h-full bg-[#00f2ff] shadow-[0_0_15px_#00f2ff]" style="animation: bootProgress 0.5s linear forwards;"></div>
            </div>
        </div>
    </div>
    <style>
        @keyframes bootProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>

    <script>
        const sectorsContainer = document.getElementById('sectors-container');
        const overlay = document.getElementById('iframe-overlay');
        const levelFrame = document.getElementById('level-frame');
        const closeBtn = document.getElementById('close-btn');
        const screenFlash = document.getElementById('screen-flash');
        const cipherNames = {
            '1.1': 'Reverse Cipher',
            '1.2': 'Caesar Cipher',
            '1.3': 'Atbash Cipher',
            '1.4': 'Monoalphabetic Substitution',
            '1.5': 'Fixed Number Encoding',
            '2.1': 'Reverse + Caesar',
            '2.2': 'Alternating Cipher',
            '2.3': 'Positional Cipher',
            '2.4': 'Vowel Scrambler',
            '2.5': 'Keyed Substitution Cipher',
            '3.1': 'Modular Shift Cipher',
            '3.2': 'Vignere Cipher',
            '3.3': 'Affined Scrambler',
            '3.4': 'Permutation Cipher',
            '3.5': 'Blocked Rotate and keying',
            '4.1': 'Pairing and +*',
            '4.2': 'Rotate and Add',
            '4.3': 'Encrypt additively then flip the block',
            '4.4': 'Mini RSA',
            '4.5': 'Mini Merkle Tree'
        };

        function createNodeMap() {
            let html = `
                <a href="/dashboard" class="fixed top-0 left-0 w-28 h-28 bg-[#00f2ff] hover:bg-white transition-colors cursor-pointer group z-50 flex items-start justify-start pl-6 pt-6 shadow-[0_0_30px_#00f2ff] outline-none" style="clip-path: polygon(0 0, 100% 0, 0 100%);">
                   <div class="w-8 h-8 flex items-center justify-center">
                     <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="stroke-black group-hover:stroke-[#00f2ff] group-hover:-translate-x-1 transition-transform">
                       <path d="m15 18-6-6 6-6"/>
                     </svg>
                   </div>
                </a>
                <div class="fixed top-6 right-10 flex flex-col items-end z-40 pointer-events-none">
                  <h1 class="font-display text-3xl md:text-4xl font-bold uppercase tracking-tight text-white text-right mb-4">Training Academy</h1>
                </div>
                <div class="pt-8"></div>
            `;

            for (let s = 1; s <= 4; s++) {
                html += `
                    <div class="mb-20">
                        <div class="sector-title">
                            <div class="sector-bg-number font-display">0${s}</div>
                            <h2 class="font-mono text-2xl uppercase tracking-[0.2em] text-[var(--current-theme-color)] mb-2">Chapter ${s}</h2>
                            <div class="h-[1px] w-full bg-gradient-to-r from-[var(--current-theme-color)] to-transparent opacity-30 mb-8"></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-6">
                `;

                for (let m = 1; m <= 5; m++) {
                    const levelId = `level${s}.${m}`;
                    const levelKey = `${s}.${m}`;
                    const cipherName = cipherNames[levelKey] || `Cipher ${s}-${m}`;
                    html += `
                        <div class="mission-card" onclick="openLevel('${levelId}')">
                            <div class="font-mono text-xs uppercase tracking-widest text-slate-400 mb-4">Level ${s}.${m}</div>
                            <h3 class="font-sans font-semibold text-lg mb-2">${cipherName}</h3>
                            <div class="font-mono text-[10px] text-slate-500 uppercase tracking-wider">Status: Online</div>
                            <div class="mission-accent-line"></div>
                        </div>
                    `;
                }
                
                html += `</div></div>`;
            }
            sectorsContainer.innerHTML = html;
        }

        function openLevel(levelId) {
            // Flash effect
            screenFlash.classList.remove('flash');
            void screenFlash.offsetWidth; // trigger reflow
            screenFlash.classList.add('flash');

            // Load iframe and show overlay
            setTimeout(() => {
                levelFrame.src = levelId + '.html';
                overlay.classList.add('active');
            }, 150);
        }

        closeBtn.addEventListener('click', () => {
            overlay.classList.remove('active');
            setTimeout(() => {
                levelFrame.src = '';
            }, 400); // Wait for transition
        });

        // Initialize
        createNodeMap();

        // Boot Loader Logic
        window.addEventListener('load', () => {
            if (document.referrer.includes('dashboard')) {
                setTimeout(() => {
                    const loader = document.getElementById('boot-loader');
                    if (loader) {
                        loader.style.opacity = '0';
                        setTimeout(() => loader.remove(), 200); // Wait for transition
                    }
                }, 500);
            } else {
                const loader = document.getElementById('boot-loader');
                if (loader) loader.remove();
            }
        });
    </script>
</body>
</html>
