<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CipherQuest | Level 2.5 | Keyed Substitution Cipher</title>

    <style>
        :root {
            --ap: #59f2ff;
            --aw: #ffdd57;
            --ag: #22c55e;
            --orange: #ff9f43;
            --purple: #b97fff;

            --tm: #f4f7ff;
            --mu: #94a3b8;

            --sp: rgba(15, 23, 42, 0.78);
            --si: rgba(2, 6, 23, 0.74);

            --bs: rgba(148, 163, 184, 0.34);
            --bb: rgba(148, 163, 184, 0.55);

            --font: system-ui, -apple-system, BlinkMacSystemFont,
                "SF Pro Text", "Segoe UI", sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            color: var(--tm);

            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;

            padding: 20px;

            overflow-x: hidden;

            background:
                radial-gradient(circle at top, #1b243b 0%, #020617 55%);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;

            background:
                radial-gradient(ellipse 55% 35% at 0% 100%,
                    rgba(255, 159, 67, 0.07) 0%,
                    transparent 70%),

                radial-gradient(ellipse 45% 30% at 100% 0%,
                    rgba(89, 242, 255, 0.06) 0%,
                    transparent 70%);
        }

        .card {
            width: 100%;
            max-width: 900px;

            position: relative;
            z-index: 2;

            overflow: hidden;

            border-radius: 20px;

            border: 1px solid var(--bs);

            background: var(--sp);

            backdrop-filter: blur(16px);

            box-shadow: 0 30px 80px rgba(0, 0, 0, .85);
        }

        /* TOPBAR */

        .topbar {
            padding: 14px 22px;

            display: flex;
            align-items: center;
            justify-content: space-between;

            background: var(--si);

            border-bottom: 1px solid var(--bs);
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .badge {
            padding: 4px 12px;

            border-radius: 999px;

            border: 1px solid rgba(255, 159, 67, .6);

            font-size: 11px;
            letter-spacing: .2em;
            text-transform: uppercase;

            color: var(--orange);
        }

        .topbar-title{font-family:'SF Mono','Fira Code',Consolas,monospace;font-size:22px;font-weight:800;text-transform:uppercase;letter-spacing:0.15em;}

        .topbar-sub {
            font-size: 11px;
            color: var(--mu);
            letter-spacing: .12em;
        }

        .live {
            color: var(--ag);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .16em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--ag);
            box-shadow: 0 0 10px var(--ag);
            animation: pulse 1.3s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .3
            }
        }

        /* STAGE */

        .stage {
            position: relative;

            min-height: auto;

            overflow: hidden;

            display: flex;
            flex-direction: column;
            align-items: center;

            gap: 18px;

            padding: 22px;
        }

        /* STATUS */

        .status {
            width: 100%;

            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .2em;

            color: var(--ap);

            min-height: 18px;
        }

        .blink {
            animation: blink .9s step-end infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        /* KEY */

        .key-section {
            width: 100%;
            opacity: 0;
            transition: .5s;
        }

        .key-section.vis {
            opacity: 1;
        }

        .key-label {
            margin-bottom: 10px;

            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .2em;

            color: var(--mu);
        }

        .key-chips {
            display: flex;
            align-items: center;
            gap: 8px;

            flex-wrap: wrap;
        }

        .kchip {
            width: 48px;
            height: 52px;

            border-radius: 10px;

            background: var(--si);

            border: 1px solid rgba(255, 159, 67, .18);

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            font-size: 20px;
            font-weight: 700;

            font-family: "Fira Code", monospace;

            color: transparent;

            transition: .3s;
        }

        .kchip.slam {
            color: var(--orange);

            border-color: rgba(255, 159, 67, .7);

            box-shadow:
                0 0 20px rgba(255, 159, 67, .55);
        }

        /* GRID */

        .mapping-section {
            width: 100%;
            opacity: 0;
            transition: .4s;
        }

        .mapping-section.vis {
            opacity: 1;
        }

        .mapping-label {
            margin-bottom: 10px;

            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .2em;

            color: var(--mu);
        }

        .alpha-grid {
            overflow-x: auto;

            border-radius: 12px;

            border: 1px solid rgba(148, 163, 184, .15);

            background: var(--si);
        }

        .alpha-row-wrap {
            display: flex;
        }

        .row-side-label {
            width: 60px;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .14em;

            border-right: 1px solid rgba(148, 163, 184, .1);
        }

        .alpha-cells {
            flex: 1;
            display: flex;
        }

        .acell {
            flex: 1;

            min-width: 34px;

            height: 40px;

            display: flex;
            align-items: center;
            justify-content: center;

            border-right: 1px solid rgba(148, 163, 184, .06);

            font-family: "Fira Code", monospace;

            color: var(--mu);

            transition: .25s;
        }

        .acell:last-child {
            border-right: none;
        }

        .plain-active {
            background: rgba(89, 242, 255, .1);
            color: var(--ap);
            font-weight: 700;
        }

        .c-key {
            color: var(--orange);
        }

        .c-fill {
            color: rgba(89, 242, 255, .7);
        }

        .c-empty {
            color: transparent;
        }

        .c-active {
            background: rgba(255, 159, 67, .1);

            color: var(--orange);

            font-weight: 700;

            box-shadow: inset 0 2px 0 var(--orange);
        }

        /* WORD CHIPS */

        .word-section {
            width: 100%;
            opacity: 0;
            transition: .4s;
        }

        .word-chips {
            display: flex;
            justify-content: center;
            gap: 10px;

            flex-wrap: wrap;
        }

        .wchip {
            width: 72px;
            height: 82px;

            border-radius: 12px;

            background: var(--si);

            border: 1px solid rgba(148, 163, 184, .18);

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            transition: .35s;

            opacity: 0;
        }

        .wchip-letter {
            font-size:46px;
            font-weight:900;

            font-family:"SF Mono","Fira Code",Consolas,monospace;
        }

        .wchip-idx {
            font-size: 9px;
            color: var(--mu);
        }

        .wchip.active {
            border-color: var(--ap);

            box-shadow:
                0 0 20px rgba(89, 242, 255, .4);
        }

        .wchip.active .wchip-letter {font-size:46px;font-weight:900;line-height:1;font-family:"SF Mono","Fira Code",Consolas,monospace;
            color: var(--ap);
        }

        .wchip.encoded {
            border-color: rgba(255, 159, 67, .5);
        }

        .wchip.encoded .wchip-letter {font-size:46px;font-weight:900;line-height:1;font-family:"SF Mono","Fira Code",Consolas,monospace;
            color: var(--orange);
        }

        /* OUTPUT */

        .output-section {
            width: 100%;
            opacity: 0;
            transform: translateY(8px);

            transition: .5s;
        }

        .output-section.vis {
            opacity: 1;
            transform: translateY(0);
        }

        .out-word {
            display: flex;
            justify-content: center;
            gap: 4px;

            flex-wrap: wrap;
        }

        .out-letter{
            font-size:42px;
            font-weight:900;

            font-family:"SF Mono","Fira Code",Consolas,monospace;

            color: var(--orange);

            opacity: 0;
            transform: scale(.6);

            transition: .35s;
        }

        .out-letter.show {
            opacity: 1;
            transform: scale(1);
        }

        /* INFO */

        .info-panel {
            width: 100%;

            padding: 18px;

            border-radius: 14px;

            background: var(--si);

            border: 1px solid var(--bs);

            opacity: 0;
            transform: translateY(8px);

            transition: .5s;
        }

        .info-panel.vis {
            opacity: 1;
            transform: translateY(0);
        }

        .info-title {
            margin-bottom: 12px;

            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .2em;

            color: var(--orange);
        }

        .formula {
            margin-top: 10px;

            padding: 14px;

            border-radius: 10px;

            background: rgba(2, 6, 23, .7);

            border: 1px solid rgba(148, 163, 184, .1);

            line-height: 1.8;

            font-family: "Fira Code", monospace;

            font-size: 12px;

            color: var(--mu);
        }

        /* FOOTER */

        .footer {
            padding: 14px 22px;

            display: flex;
            align-items: center;
            justify-content: space-between;

            border-top: 1px solid var(--bs);

            background: var(--si);
        }

        .foot-btn {
            padding: 8px 18px;

            border-radius: 999px;

            border: 1px solid rgba(89, 242, 255, .4);

            background: rgba(89, 242, 255, .06);

            color: var(--ap);

            cursor: pointer;

            transition: .2s;
        }

        .foot-btn:hover {
            background: rgba(89, 242, 255, .14);
        }

        .foot-btn.primary {
            color: var(--ap);
            background: rgba(89, 242, 255, 0.06);
            border-color: rgba(89, 242, 255, 0.4);
        }

        .replay-tag {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: var(--mu);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .rtick {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(148, 163, 184, 0.3);
            animation: rtick 1s step-end infinite;
        }

        @keyframes rtick {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* MOBILE */

        @media(max-width:768px) {

            body {
                padding: 10px;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .topbar-title{font-family:'SF Mono','Fira Code',Consolas,monospace;font-size:22px;font-weight:800;text-transform:uppercase;letter-spacing:0.15em;}

            .acell {
                min-width: 28px;
                font-size: 11px;
            }

            .wchip {
                width: 60px;
                height: 72px;
            }

            .wchip-letter {
                font-size:46px;
            font-family:'SF Mono','Fira Code',Consolas,monospace;}

            .out-letter{
                font-size:42px;
            }
        }
    
        #speedDown,
        #speedUp {
            width: 28px;
            height: 26px;
            display: inline-grid;
            place-items: center;
            padding: 0;
            border: 1px solid rgba(89, 242, 255, 0.36);
            border-radius: 999px;
            background: rgba(89, 242, 255, 0.08);
            color: #59f2ff;
            font-size: 14px;
            font-weight: 900;
            line-height: 1;
            cursor: pointer;
            transition: background .18s ease, box-shadow .18s ease, transform .18s ease;
        }

        #speedDown:hover,
        #speedUp:hover {
            background: rgba(89, 242, 255, 0.16);
            box-shadow: 0 0 14px rgba(89, 242, 255, 0.24);
            transform: translateY(-1px);
        }

        #speedDisplay {
            min-width: 44px;
            color: #dffbff;
            font-variant-numeric: tabular-nums;
            text-align: center;
            font-family: "SF Mono", "Fira Code", Consolas, monospace;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .08em;
        }

        #btn-play,
        #btn-step,
        #btn-next,
        #replay,
        #replayBtn,
        #replayNow,
        #nextBtn,
        .btn,
        .foot-btn {
            min-height: 34px;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: .1em;
            font-size: 11px;
            font-weight: 800;
        }

        #btn-play,
        #replay,
        #replayBtn,
        #replayNow {
            border: 1px solid rgba(89, 242, 255, 0.46);
            background: rgba(89, 242, 255, 0.10);
            color: #59f2ff;
        }

        #btn-next,
        #btn-step,
        #nextBtn,
        .foot-btn.primary {
            border: 1px solid rgba(255, 221, 87, 0.46);
            background: rgba(255, 221, 87, 0.10);
            color: #ffdd57;
        }

        #btn-play:hover,
        #btn-step:hover,
        #btn-next:hover,
        #replay:hover,
        #replayBtn:hover,
        #replayNow:hover,
        #nextBtn:hover {
            box-shadow: 0 0 16px rgba(89, 242, 255, 0.22);
        }

    .step-btn {
      border-radius: 6px !important;
      background: rgba(89, 242, 255, 0.1) !important;
      border: 1px solid rgba(89, 242, 255, 0.4) !important;
      color: #59f2ff !important;
    }
    .step-btn:hover:not(:disabled) {
      background: rgba(89, 242, 255, 0.2) !important;
      box-shadow: 0 0 10px rgba(89, 242, 255, 0.3) !important;
    }
    .step-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .next-cipher-btn {
      background: #ffdd57 !important;
      color: #000 !important;
      border: none !important;
      border-radius: 999px !important;
      font-weight: 800 !important;
    }
    .next-cipher-btn:hover {
      box-shadow: 0 0 16px rgba(255, 221, 87, 0.6) !important;
    }
    
    
    /* -- PERFECTED BUTTON STYLES -- */
    .foot-btn, .step-btn, .next-cipher-btn, .go-btn, #goBtn, #replayBtn, #btn-next, #prevStep, #nextStep, #startBtn, #nextBtn {
        padding: 8px 16px !important;
        border-radius: 8px !important;
        font-size: 12px !important;
        font-weight: 700 !important;
        text-transform: uppercase !important;
        letter-spacing: 0.1em !important;
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 8px !important;
        clip-path: none !important;
        min-height: auto !important;
        box-sizing: border-box !important;
        cursor: pointer;
        transition: all 0.2s ease !important;
        font-family: inherit !important;
    }

    /* NEXT STEP & PREV STEP */
    #prevStep, #nextStep, .step-btn:not(#goBtn):not(#startBtn):not(.go-btn) {
        background: #59f2ff !important;
        color: #000 !important;
        border: 1px solid #59f2ff !important;
        opacity: 1 !important;
    }

    #prevStep:disabled, #nextStep:disabled, .step-btn:disabled {
        background: rgba(89, 242, 255, 0.4) !important;
        color: rgba(0, 0, 0, 0.7) !important;
        border: 1px solid transparent !important;
        cursor: not-allowed !important;
        box-shadow: none !important;
    }

    #prevStep:hover:not(:disabled), #nextStep:hover:not(:disabled), .step-btn:hover:not(:disabled) {
        box-shadow: 0 0 14px rgba(89, 242, 255, 0.4) !important;
    }

    /* RESTART & START */
    #replayBtn, #goBtn, #startBtn, .go-btn, #replay, #replayNow {
        background: #1e293b !important;
        color: #cbd5e1 !important;
        border: 1px solid #334155 !important;
    }
    
    #replayBtn:hover:not(:disabled), #goBtn:hover:not(:disabled), #startBtn:hover:not(:disabled), .go-btn:hover:not(:disabled), #replay:hover:not(:disabled), #replayNow:hover:not(:disabled) {
        background: #334155 !important;
        color: #f1f5f9 !important;
    }

    /* NEXT CIPHER */
    #btn-next, .next-cipher-btn, #nextBtn {
        background: #ffdd57 !important;
        color: #000 !important;
        border: 1px solid #ffdd57 !important;
    }
    #btn-next:hover, .next-cipher-btn:hover, #nextBtn:hover {
        box-shadow: 0 0 16px rgba(255, 221, 87, 0.5) !important;
    }

    </style>
    <script src="global_controls.js"></script>
</head>

<body>

    <div class="card">

        <div class="topbar">

            <div class="topbar-left">

                <span class="badge">CH 02</span>

                <div>
                    <div class="topbar-title">
                        Keyed Substitution Cipher
                    </div>

                    <div class="topbar-sub">
                        Cipher · Key First Then Remaining Alphabet
                    </div>
                </div>

            </div>

            <div class="live">Auto Demo</div>

        </div>

        <div class="stage">

            <!-- FIXED STATUS -->
            <div class="status" id="status">
                <span id="statusTxt">
                    Initializing…
                </span>

                <span class="blink">
                    ▌
                </span>
            </div>

            <div class="key-section" id="keySec">

                <div class="key-label">
                    Secret Key
                </div>

                <div class="key-chips" id="keyChips"></div>

            </div>

            <div class="mapping-section" id="mappingSec">

                <div class="mapping-label">
                    Substitution Alphabet
                </div>

                <div class="alpha-grid">

                    <div class="alpha-row-wrap">

                        <div class="row-side-label">
                            Plain
                        </div>

                        <div class="alpha-cells" id="plainRow"></div>

                    </div>

                    <div class="alpha-row-wrap">

                        <div class="row-side-label">
                            Cipher
                        </div>

                        <div class="alpha-cells" id="cipherRow"></div>

                    </div>

                </div>

            </div>

            <div class="word-section" id="wordSection">

                <div class="word-chips" id="wordChips"></div>

            </div>

            <div class="output-section" id="outputSec">

                <div class="out-word" id="outWord"></div>

            </div>

            <div class="info-panel" id="infoPanel">

                <div class="info-title">
                    Cipher Breakdown
                </div>

                <div class="formula" id="formulaBox"></div>

            </div>

        </div>

        <div class="footer">
            <div style="display:flex; gap:12px;">
                <button class="foot-btn step-btn" id="prevStep" disabled>Prev Step</button>
                <button class="foot-btn step-btn" id="nextStep" disabled>Next Step</button>
                <button class="foot-btn" id="replayBtn">Restart</button>
            </div>
            <button class="foot-btn next-cipher-btn" id="btn-next">Next Cipher →</button>
        </div>

    </div>

    <!-- FLY PARTICLE -->

    <div id="flyer" style="
position:fixed;
z-index:400;
pointer-events:none;
width:44px;
height:44px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-family:'Fira Code',monospace;
font-size:19px;
font-weight:700;
background:rgba(2,6,23,.95);
opacity:0;
will-change:transform,left,top;
"></div>

    <script>
        const ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const WORD = 'CIPHER';
        const KEY = 'XIATUV';
        
        let currentStep = -1;
        let cipherAlpha = [];
        let encoded = [];

        const $ = id => document.getElementById(id);
        const prevStepBtn = $('prevStep'), nextStepBtn = $('nextStep'), btnNext = $('btn-next'), replayBtn = $('replayBtn');

        function setStatus(txt, color) {
            if ($('statusTxt')) $('statusTxt').textContent = txt;
            if ($('status')) $('status').style.color = color;
        }

        function buildCipherAlpha(key) {
            const seen = new Set();
            const out = [];
            for (const ch of key) {
                if (!seen.has(ch)) { seen.add(ch); out.push(ch); }
            }
            for (const ch of ALPHA) {
                if (!seen.has(ch)) { seen.add(ch); out.push(ch); }
            }
            return out;
        }

        function resetDemo() {
            cipherAlpha = buildCipherAlpha(KEY);
            encoded = [];
            for (let i = 0; i < WORD.length; i++) {
                const ch = WORD[i];
                const idx = ALPHA.indexOf(ch);
                encoded.push(cipherAlpha[idx]);
            }

            $('keySec').classList.add('vis');
            $('mappingSec').classList.add('vis');
            $('wordSection').style.opacity = '1';

            $('plainRow').innerHTML = '';
            $('cipherRow').innerHTML = '';
            $('wordChips').innerHTML = '';
            $('outWord').innerHTML = '';
            
            $('outputSec').classList.remove('vis');
            $('infoPanel').classList.remove('vis');

            ALPHA.split('').forEach((c, i) => {
                const p = document.createElement('div');
                p.className = 'acell';
                p.id = 'p' + i;
                p.textContent = c;
                $('plainRow').appendChild(p);

                const cc = document.createElement('div');
                cc.className = 'acell c-empty';
                cc.id = 'c' + i;
                $('cipherRow').appendChild(cc);
            });

            $('keyChips').innerHTML = '';
            for (let i = 0; i < KEY.length; i++) {
                const k = document.createElement('div');
                k.className = 'kchip';
                k.textContent = KEY[i];
                $('keyChips').appendChild(k);
            }

            WORD.split('').forEach((c, i) => {
                const w = document.createElement('div');
                w.className = 'wchip';
                w.id = 'w' + i;
                w.style.opacity = '1';
                w.innerHTML = `<div class="wchip-letter" id="wl${i}">${c}</div><div class="wchip-idx">[${i}]</div>`;
                $('wordChips').appendChild(w);
            });

            currentStep = -1;
            updateButtons();
            setStatus('Initializing...', 'var(--ag)');
        }

        function updateButtons() {
            if (prevStepBtn) prevStepBtn.disabled = currentStep < 0;
            if (nextStepBtn) nextStepBtn.disabled = currentStep > WORD.length;
        }

        function renderStep(step) {
            if (step < -1 || step > WORD.length + 1) return;
            currentStep = step;
            updateButtons();

            // Reset visual states
            for (let i = 0; i < 26; i++) {
                const cell = $('c' + i);
                cell.className = 'acell c-empty';
                cell.textContent = '';
                $('p' + i).classList.remove('plain-active');
            }
            for (let i = 0; i < KEY.length; i++) {
                const k = $('keyChips').children[i];
                if (k) k.classList.remove('slam');
            }
            for (let i = 0; i < WORD.length; i++) {
                const w = $('w' + i);
                if (w) {
                    w.classList.remove('active', 'encoded');
                    $('wl' + i).textContent = WORD[i];
                }
            }
            $('outWord').innerHTML = '';
            $('outputSec').classList.remove('vis');
            $('infoPanel').classList.remove('vis');

            if (currentStep === -1) {
                setStatus('Initializing...', 'var(--ag)');
                return;
            }

            // Step 0: Build cipher alphabet
            if (currentStep >= 0) {
                for (let i = 0; i < KEY.length; i++) {
                    const k = $('keyChips').children[i];
                    if (k) k.classList.add('slam');
                }
                for (let i = 0; i < 26; i++) {
                    const cell = $('c' + i);
                    cell.textContent = cipherAlpha[i];
                    cell.className = i < KEY.length ? 'acell c-key' : 'acell c-fill';
                }
                setStatus('Cipher alphabet built.', 'var(--orange)');
            }

            // Steps 1 to WORD.length: Encode letters
            for (let i = 0; i < currentStep && i < WORD.length; i++) {
                const ch = WORD[i];
                const idx = ALPHA.indexOf(ch);
                const enc = cipherAlpha[idx];
                
                const w = $('w' + i);
                w.classList.add('encoded');
                $('wl' + i).textContent = enc;
                
                const out = document.createElement('div');
                out.className = 'out-letter show';
                out.textContent = enc;
                $('outWord').appendChild(out);
                
                $('outputSec').classList.add('vis');
                
                if (i === currentStep - 1) {
                    $('p' + idx).classList.add('plain-active');
                    $('c' + idx).classList.add('c-active');
                    w.classList.remove('encoded');
                    w.classList.add('active');
                    setStatus(`${ch} → ${enc}`, 'var(--ap)');
                }
            }

            // Step WORD.length + 1: Completion
            if (currentStep === WORD.length + 1) {
                const finalWord = encoded.join('');
                setStatus(`Encoded → ${finalWord}`, 'var(--ag)');
                
                $('formulaBox').innerHTML = `
                  KEY: ${KEY}<br><br>
                  Cipher Alphabet:<br>${cipherAlpha.join(' ')}<br><br>
                  Encoded Word:<br>CIPHER → ${finalWord}
                `;
                $('infoPanel').classList.add('vis');
            }
        }

        if (prevStepBtn) prevStepBtn.addEventListener('click', () => renderStep(currentStep - 1));
        if (nextStepBtn) nextStepBtn.addEventListener('click', () => renderStep(currentStep + 1));
        if (replayBtn) replayBtn.addEventListener('click', resetDemo);
        if (btnNext) btnNext.addEventListener('click', () => window.location.href = "level3.1.html");

        resetDemo();
</script>

</body>
