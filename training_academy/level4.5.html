<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CipherQuest | Level 4.5 | Mini Merkle Tree</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --cyan: #06b6d4;
    --cyan-glow: #22d3ee;
    --orange: #f97316;
    --orange-glow: #fb923c;
    --purple: #a855f7;
    --purple-glow: #c084fc;
    --green: #22c55e;
    --green-glow: #4ade80;
    --pink: #ec4899;
    --pink-glow: #f472b6;
    --bg-dark: #0f172a;
  }

  body {
    background-color: var(--bg-dark);
    color: #e2e8f0;
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    background-image: 
      radial-gradient(circle at 50% 0%, rgba(30, 41, 59, 0.8) 0%, transparent 60%),
      linear-gradient(rgba(15, 23, 42, 0.8) 1px, transparent 1px),
      linear-gradient(90deg, rgba(15, 23, 42, 0.8) 1px, transparent 1px);
    background-size: 100% 100%, 30px 30px, 30px 30px;
  }

  /* Node Animations & States */
  .tree-node {
    transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    opacity: 0;
    transform: scale(0.5);
  }

  .tree-node.active {
    opacity: 1;
    transform: scale(1);
    filter: grayscale(0%);
  }

  .tree-node.dimmed {
    opacity: 0.25;
    filter: grayscale(80%);
    transform: scale(0.9);
  }

  /* Structural Shapes */
  .node-box {
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
    transition: all 0.5s ease;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }

  .node-box.glow-slate {
    box-shadow: 0 0 10px rgba(148, 163, 184, 0.2), inset 0 0 0 1px #64748b;
    background: rgba(30, 41, 59, 0.8);
    color: #f1f5f9;
  }

  .node-box.glow-orange {
    box-shadow: 0 0 15px rgba(251, 146, 60, 0.4), inset 0 0 0 2px var(--orange-glow);
    background: rgba(249, 115, 22, 0.15);
    border: 1px dashed var(--orange-glow);
    color: #ffedd5;
  }

  .node-box.glow-cyan {
    box-shadow: 0 0 20px rgba(34, 211, 238, 0.4), inset 0 0 0 2px var(--cyan-glow);
    background: rgba(6, 182, 212, 0.15);
    color: #cffafe;
  }

  .node-box.glow-purple {
    box-shadow: 0 0 20px rgba(192, 132, 252, 0.4), inset 0 0 0 2px var(--purple-glow);
    background: rgba(168, 85, 247, 0.15);
    color: #f3e8ff;
  }

  .node-box.glow-green {
    box-shadow: 0 0 30px rgba(74, 222, 128, 0.6), inset 0 0 0 3px var(--green-glow);
    background: rgba(34, 197, 94, 0.2);
    color: #dcfce7;
    transform: scale(1.15);
  }

  /* Brackets (Connecting Lines) */
  .bracket-line, .stem-line {
    transition: all 0.5s ease;
    opacity: 0.1;
  }
  
  /* Cyan active lines */
  .bracket-line.active-cyan { border-color: var(--cyan-glow); opacity: 0.8; box-shadow: 0 5px 15px rgba(34, 211, 238, 0.3); }
  .stem-line.active-cyan { background-color: var(--cyan-glow); opacity: 0.8; box-shadow: 0 0 10px rgba(34, 211, 238, 0.5); }
  
  /* Purple active lines */
  .bracket-line.active-purple { border-color: var(--purple-glow); opacity: 0.8; box-shadow: 0 5px 15px rgba(192, 132, 252, 0.3); }
  .stem-line.active-purple { background-color: var(--purple-glow); opacity: 0.8; box-shadow: 0 0 10px rgba(192, 132, 252, 0.5); }

  /* Green active lines */
  .bracket-line.active-green { border-color: var(--green-glow); opacity: 1; box-shadow: 0 5px 15px rgba(74, 222, 128, 0.4); }
  .stem-line.active-green { background-color: var(--green-glow); opacity: 1; box-shadow: 0 0 15px rgba(74, 222, 128, 0.6); }

  /* Formula Tag Tooltips */
  .formula-tag {
    opacity: 0;
    transform: translateY(-10px) scale(0.8);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .formula-tag.show { opacity: 1; transform: translateY(0) scale(1); }

  @keyframes pulse-border {
    0%, 100% { border-color: rgba(34, 211, 238, 0.2); }
    50% { border-color: rgba(34, 211, 238, 0.6); }
  }
  .active-step-border { animation: pulse-border 2.5s infinite; }

  /* Responsive Text Sizes for small nodes */
  .node-val { font-size: 1.25rem; line-height: 1.2; font-weight: 900; }
  .node-idx { font-size: 0.65rem; font-family: monospace; color: #94a3b8; }
  @media (min-width: 768px) {
    .node-val { font-size: 1.5rem; }
    .node-idx { font-size: 0.75rem; }
  }

    @media (max-height: 800px) {
        .shell, .glass-panel, .max-w-4xl {
            transform: scale(0.9);
            transform-origin: top center;
        }
    }
    @media (max-height: 700px) {
        .shell, .glass-panel, .max-w-4xl {
            transform: scale(0.8);
            transform-origin: top center;
        }
    }
    @media (max-height: 600px) {
        .shell, .glass-panel, .max-w-4xl {
            transform: scale(0.7);
            transform-origin: top center;
        }
    }

        #speedDown,
        #speedUp {
            width: 28px;
            height: 26px;
            display: inline-grid;
            place-items: center;
            padding: 0;
            border: 1px solid rgba(89, 242, 255, 0.36);
            border-radius: 999px;
            background: rgba(89, 242, 255, 0.08);
            color: #59f2ff;
            font-size: 14px;
            font-weight: 900;
            line-height: 1;
            cursor: pointer;
            transition: background .18s ease, box-shadow .18s ease, transform .18s ease;
        }

        #speedDown:hover,
        #speedUp:hover {
            background: rgba(89, 242, 255, 0.16);
            box-shadow: 0 0 14px rgba(89, 242, 255, 0.24);
            transform: translateY(-1px);
        }

        #speedDisplay {
            min-width: 44px;
            color: #dffbff;
            font-variant-numeric: tabular-nums;
            text-align: center;
            font-family: "SF Mono", "Fira Code", Consolas, monospace;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .08em;
        }

        #btn-play,
        #btn-step,
        #btn-next,
        #replay,
        #replayBtn,
        #replayNow,
        #nextBtn,
        .btn,
        .foot-btn {
            min-height: 34px;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: .1em;
            font-size: 11px;
            font-weight: 800;
        }

        #btn-play,
        #replay,
        #replayBtn,
        #replayNow {
            border: 1px solid rgba(89, 242, 255, 0.46);
            background: rgba(89, 242, 255, 0.10);
            color: #59f2ff;
        }

        #btn-next,
        #btn-step,
        #nextBtn,
        .foot-btn.primary {
            border: 1px solid rgba(255, 221, 87, 0.46);
            background: rgba(255, 221, 87, 0.10);
            color: #ffdd57;
        }

        #btn-play:hover,
        #btn-step:hover,
        #btn-next:hover,
        #replay:hover,
        #replayBtn:hover,
        #replayNow:hover,
        #nextBtn:hover {
            box-shadow: 0 0 16px rgba(89, 242, 255, 0.22);
        }

    
    /* -- PERFECTED BUTTON STYLES -- */
    .foot-btn, .step-btn, .next-cipher-btn, .go-btn, #goBtn, #replayBtn, #btn-next, #prevStep, #nextStep, #startBtn, #nextBtn {
        padding: 8px 16px !important;
        border-radius: 8px !important;
        font-size: 12px !important;
        font-weight: 700 !important;
        text-transform: uppercase !important;
        letter-spacing: 0.1em !important;
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 8px !important;
        clip-path: none !important;
        min-height: auto !important;
        box-sizing: border-box !important;
        cursor: pointer;
        transition: all 0.2s ease !important;
        font-family: inherit !important;
    }

    /* NEXT STEP & PREV STEP */
    #prevStep, #nextStep, .step-btn:not(#goBtn):not(#startBtn):not(.go-btn) {
        background: #59f2ff !important;
        color: #000 !important;
        border: 1px solid #59f2ff !important;
        opacity: 1 !important;
    }

    #prevStep:disabled, #nextStep:disabled, .step-btn:disabled {
        background: rgba(89, 242, 255, 0.4) !important;
        color: rgba(0, 0, 0, 0.7) !important;
        border: 1px solid transparent !important;
        cursor: not-allowed !important;
        box-shadow: none !important;
    }

    #prevStep:hover:not(:disabled), #nextStep:hover:not(:disabled), .step-btn:hover:not(:disabled) {
        box-shadow: 0 0 14px rgba(89, 242, 255, 0.4) !important;
    }

    /* RESTART & START */
    #replayBtn, #goBtn, #startBtn, .go-btn, #replay, #replayNow {
        background: #1e293b !important;
        color: #cbd5e1 !important;
        border: 1px solid #334155 !important;
    }
    
    #replayBtn:hover:not(:disabled), #goBtn:hover:not(:disabled), #startBtn:hover:not(:disabled), .go-btn:hover:not(:disabled), #replay:hover:not(:disabled), #replayNow:hover:not(:disabled) {
        background: #334155 !important;
        color: #f1f5f9 !important;
    }

    /* NEXT CIPHER */
    #btn-next, .next-cipher-btn, #nextBtn {
        background: #ffdd57 !important;
        color: #000 !important;
        border: 1px solid #ffdd57 !important;
    }
    #btn-next:hover, .next-cipher-btn:hover, #nextBtn:hover {
        box-shadow: 0 0 16px rgba(255, 221, 87, 0.5) !important;
    }

    </style>
    <script src="global_controls.js"></script>
</head>
<body class="min-h-0 flex items-center justify-center p-2 md:p-6 overflow-x-hidden">

<div class="w-full max-w-6xl bg-slate-900/95 border border-slate-700/80 rounded-2xl shadow-2xl backdrop-blur-xl overflow-hidden flex flex-col">
  
  <!-- Header -->
  <header class="flex flex-col md:flex-row items-center justify-between p-4 md:p-6 bg-slate-950/80 border-b border-slate-800">
    <div>
      <h1 class="text-xl md:text-2xl font-black text-white flex items-center gap-2 uppercase tracking-wide">
        <i data-lucide="trophy" class="w-6 h-6 text-yellow-400"></i> 
        Mini Merkle Tree
      </h1>
      <p class="text-xs md:text-sm text-slate-400 mt-1 uppercase tracking-wider">8-leaf cryptographic tree</p>
    </div>
    
    <div class="flex gap-4 mt-4 md:mt-0">
      <div class="bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 flex flex-col items-center shadow-inner">
        <span class="text-[9px] text-slate-500 font-bold uppercase mb-1">Fusion Formula h(a, b)</span>
        <span class="text-sm font-mono font-bold text-cyan-400">(a×3 + b×7) mod 26</span>
      </div>
    </div>
  </header>

  <!-- Main Arena -->
  <main class="p-4 md:p-8 flex-1 relative flex flex-col items-center">
    
    <!-- Explainer Narrative -->
    <div class="mb-8 w-full max-w-4xl bg-slate-800/40 border border-slate-700 rounded-xl p-4 md:p-5 flex items-start gap-4 active-step-border transition-colors duration-500 min-h-[120px] md:min-h-[100px]">
      <div class="bg-slate-900 p-2 rounded-lg border border-slate-700 shrink-0">
        <i data-lucide="cpu" class="w-5 h-5 text-cyan-400 animate-pulse"></i>
      </div>
      <div class="w-full">
        <h2 id="step-title" class="text-base md:text-lg font-black text-cyan-400 mb-2 uppercase tracking-wider">1. The Contenders</h2>
        <div id="step-desc" class="text-slate-300 text-xs md:text-sm leading-relaxed">
          <!-- JS Injected Narrative -->
        </div>
      </div>
    </div>

    <!-- THE BRACKET GRID -->
    <div class="w-full max-w-5xl flex flex-col items-center relative z-10 pb-6">
      
      <!-- LEVEL 0: LEAVES (8 Nodes) -->
      <div class="grid grid-cols-8 w-full gap-1 md:gap-4 px-1 md:px-4">
        <!-- C -->
        <div id="l-0" class="tree-node flex justify-center"><div id="bx-0" class="node-box glow-slate w-10 h-12 md:w-16 md:h-16 rounded-xl flex flex-col items-center justify-center"><span class="node-val">C</span><span class="node-idx idx-lbl hidden">2</span></div></div>
        <!-- I -->
        <div id="l-1" class="tree-node flex justify-center"><div id="bx-1" class="node-box glow-slate w-10 h-12 md:w-16 md:h-16 rounded-xl flex flex-col items-center justify-center"><span class="node-val">I</span><span class="node-idx idx-lbl hidden">8</span></div></div>
        <!-- P -->
        <div id="l-2" class="tree-node flex justify-center"><div id="bx-2" class="node-box glow-slate w-10 h-12 md:w-16 md:h-16 rounded-xl flex flex-col items-center justify-center"><span class="node-val">P</span><span class="node-idx idx-lbl hidden">15</span></div></div>
        <!-- H -->
        <div id="l-3" class="tree-node flex justify-center"><div id="bx-3" class="node-box glow-slate w-10 h-12 md:w-16 md:h-16 rounded-xl flex flex-col items-center justify-center"><span class="node-val">H</span><span class="node-idx idx-lbl hidden">7</span></div></div>
        <!-- E -->
        <div id="l-4" class="tree-node flex justify-center"><div id="bx-4" class="node-box glow-slate w-10 h-12 md:w-16 md:h-16 rounded-xl flex flex-col items-center justify-center"><span class="node-val">E</span><span class="node-idx idx-lbl hidden">4</span></div></div>
        <!-- R -->
        <div id="l-5" class="tree-node flex justify-center"><div id="bx-5" class="node-box glow-slate w-10 h-12 md:w-16 md:h-16 rounded-xl flex flex-col items-center justify-center"><span class="node-val">R</span><span class="node-idx idx-lbl hidden">17</span></div></div>
        <!-- PAD 1 -->
        <div id="l-6" class="tree-node flex justify-center"><div id="bx-6" class="node-box glow-orange w-10 h-12 md:w-16 md:h-16 rounded-xl flex flex-col items-center justify-center"><span class="node-val opacity-0">A</span><span class="node-idx idx-lbl hidden opacity-0">0</span></div></div>
        <!-- PAD 2 -->
        <div id="l-7" class="tree-node flex justify-center"><div id="bx-7" class="node-box glow-orange w-10 h-12 md:w-16 md:h-16 rounded-xl flex flex-col items-center justify-center"><span class="node-val opacity-0">A</span><span class="node-idx idx-lbl hidden opacity-0">0</span></div></div>
      </div>

      <!-- QF BRACKETS -->
      <div class="grid grid-cols-4 w-full px-1 md:px-4 -mt-2 md:-mt-3 z-0 relative">
        <div class="flex flex-col items-center"><div id="bkt-qf-0" class="w-1/2 h-6 md:h-8 border-b-2 border-l-2 border-r-2 border-slate-700 rounded-b-lg bracket-line"></div><div id="stm-qf-0" class="w-0.5 h-3 md:h-4 bg-slate-700 stem-line relative"><div id="frm-qf-0" class="formula-tag absolute left-2 md:left-4 top-1 text-[8px] md:text-[10px] bg-cyan-950 border border-cyan-800 text-cyan-200 px-1.5 py-0.5 rounded font-mono font-bold">h(2,8)</div></div></div>
        <div class="flex flex-col items-center"><div id="bkt-qf-1" class="w-1/2 h-6 md:h-8 border-b-2 border-l-2 border-r-2 border-slate-700 rounded-b-lg bracket-line"></div><div id="stm-qf-1" class="w-0.5 h-3 md:h-4 bg-slate-700 stem-line relative"><div id="frm-qf-1" class="formula-tag absolute left-2 md:left-4 top-1 text-[8px] md:text-[10px] bg-cyan-950 border border-cyan-800 text-cyan-200 px-1.5 py-0.5 rounded font-mono font-bold">h(15,7)</div></div></div>
        <div class="flex flex-col items-center"><div id="bkt-qf-2" class="w-1/2 h-6 md:h-8 border-b-2 border-l-2 border-r-2 border-slate-700 rounded-b-lg bracket-line"></div><div id="stm-qf-2" class="w-0.5 h-3 md:h-4 bg-slate-700 stem-line relative"><div id="frm-qf-2" class="formula-tag absolute right-2 md:right-4 top-1 text-[8px] md:text-[10px] bg-cyan-950 border border-cyan-800 text-cyan-200 px-1.5 py-0.5 rounded font-mono font-bold">h(4,17)</div></div></div>
        <div class="flex flex-col items-center"><div id="bkt-qf-3" class="w-1/2 h-6 md:h-8 border-b-2 border-l-2 border-r-2 border-slate-700 rounded-b-lg bracket-line"></div><div id="stm-qf-3" class="w-0.5 h-3 md:h-4 bg-slate-700 stem-line relative"><div id="frm-qf-3" class="formula-tag absolute right-2 md:right-4 top-1 text-[8px] md:text-[10px] bg-cyan-950 border border-cyan-800 text-cyan-200 px-1.5 py-0.5 rounded font-mono font-bold">h(0,0)</div></div></div>
      </div>

      <!-- LEVEL 1: QUARTER FINALS (4 Nodes) -->
      <div class="grid grid-cols-4 w-full px-1 md:px-4 z-10">
        <!-- QF1: K(10) -->
        <div id="qf-0" class="tree-node flex justify-center"><div id="bx-qf-0" class="node-box bg-slate-800 w-12 h-14 md:w-20 md:h-20 rounded-xl flex flex-col items-center justify-center border border-slate-600"><span class="node-val">K</span><span class="node-idx">10</span></div></div>
        <!-- QF2: Q(16) -->
        <div id="qf-1" class="tree-node flex justify-center"><div id="bx-qf-1" class="node-box bg-slate-800 w-12 h-14 md:w-20 md:h-20 rounded-xl flex flex-col items-center justify-center border border-slate-600"><span class="node-val">Q</span><span class="node-idx">16</span></div></div>
        <!-- QF3: B(1) -->
        <div id="qf-2" class="tree-node flex justify-center"><div id="bx-qf-2" class="node-box bg-slate-800 w-12 h-14 md:w-20 md:h-20 rounded-xl flex flex-col items-center justify-center border border-slate-600"><span class="node-val">B</span><span class="node-idx">1</span></div></div>
        <!-- QF4: A(0) -->
        <div id="qf-3" class="tree-node flex justify-center"><div id="bx-qf-3" class="node-box bg-slate-800 w-12 h-14 md:w-20 md:h-20 rounded-xl flex flex-col items-center justify-center border border-slate-600"><span class="node-val">A</span><span class="node-idx">0</span></div></div>
      </div>

      <!-- SF BRACKETS -->
      <div class="grid grid-cols-2 w-full px-1 md:px-4 -mt-2 md:-mt-3 z-0 relative">
        <div class="flex flex-col items-center"><div id="bkt-sf-0" class="w-1/2 h-8 md:h-12 border-b-2 border-l-2 border-r-2 border-slate-700 rounded-b-xl bracket-line"></div><div id="stm-sf-0" class="w-0.5 h-5 md:h-8 bg-slate-700 stem-line relative"><div id="frm-sf-0" class="formula-tag absolute left-3 md:left-6 top-2 text-[9px] md:text-xs bg-purple-950 border border-purple-800 text-purple-200 px-2 py-0.5 rounded font-mono font-bold shadow-lg">h(10,16)</div></div></div>
        <div class="flex flex-col items-center"><div id="bkt-sf-1" class="w-1/2 h-8 md:h-12 border-b-2 border-l-2 border-r-2 border-slate-700 rounded-b-xl bracket-line"></div><div id="stm-sf-1" class="w-0.5 h-5 md:h-8 bg-slate-700 stem-line relative"><div id="frm-sf-1" class="formula-tag absolute right-3 md:right-6 top-2 text-[9px] md:text-xs bg-purple-950 border border-purple-800 text-purple-200 px-2 py-0.5 rounded font-mono font-bold shadow-lg">h(1,0)</div></div></div>
      </div>

      <!-- LEVEL 2: SEMI FINALS (2 Nodes) -->
      <div class="grid grid-cols-2 w-full px-1 md:px-4 z-10">
        <!-- SF1: M(12) -->
        <div id="sf-0" class="tree-node flex justify-center"><div id="bx-sf-0" class="node-box bg-slate-800 w-14 h-16 md:w-24 md:h-24 rounded-2xl flex flex-col items-center justify-center border border-slate-600"><span class="node-val">M</span><span class="node-idx">12</span></div></div>
        <!-- SF2: D(3) -->
        <div id="sf-1" class="tree-node flex justify-center"><div id="bx-sf-1" class="node-box bg-slate-800 w-14 h-16 md:w-24 md:h-24 rounded-2xl flex flex-col items-center justify-center border border-slate-600"><span class="node-val">D</span><span class="node-idx">3</span></div></div>
      </div>

      <!-- FINAL BRACKET -->
      <div class="grid grid-cols-1 w-full px-1 md:px-4 -mt-2 md:-mt-3 z-0 relative">
        <div class="flex flex-col items-center">
          <div id="bkt-fin" class="w-1/2 h-4 md:h-6 border-b-[3px] border-l-[3px] border-r-[3px] border-slate-700 rounded-b-[1.5rem] bracket-line"></div>
          <div id="stm-fin" class="w-[3px] h-3 md:h-4 bg-slate-700 stem-line relative">
            <div id="frm-fin" class="formula-tag absolute left-4 md:left-8 top-2 text-[10px] md:text-sm bg-green-950 border border-green-700 text-green-300 px-3 py-1 rounded font-mono font-black shadow-xl">h(12,3)</div>
          </div>
        </div>
      </div>

      <!-- LEVEL 3: ROOT (1 Node) -->
      <div class="flex justify-center w-full z-10">
        <div id="root" class="tree-node flex justify-center relative">
          <div id="root-label" class="absolute -left-16 md:-left-24 top-6 text-[10px] md:text-xs font-black text-green-400 uppercase tracking-widest hidden sm:block opacity-0 transition-opacity duration-1000">The<br>Root</div>
          <div id="bx-root" class="node-box bg-slate-800 w-14 h-16 md:w-18 md:h-20 rounded-3xl flex flex-col items-center justify-center border-2 border-slate-600 shadow-2xl">
            <i data-lucide="award" class="w-6 h-6 text-green-400 mb-1 opacity-0 transition-opacity duration-1000" id="root-icon"></i>
            <span class="node-val !text-xl md:!text-3xl">F</span>
            <span class="node-idx !text-xs md:!text-sm">5</span>
          </div>
        </div>
      </div>

    </div>

  </main>

  <!-- Controls -->    
    <div class="footer flex items-center justify-between p-4 bg-slate-950/90 border-t border-slate-800 relative z-20 w-full">
        <div style="display:flex;gap:12px">
            <button class="foot-btn step-btn" id="prevStep" disabled>Prev Step</button>
            <button class="foot-btn step-btn" id="nextStep" disabled>Next Step</button>
            <button class="foot-btn" id="replayBtn">Restart</button>
        </div>
        <div class="flex items-center gap-2">
            <div class="flex gap-1" id="progress-dots"></div>
            
        </div>
    </div>


</div>

<script>
  lucide.createIcons();

  const steps = [
    {
      id: 0,
      title: "1. The Word",
      desc: `<p>We want to encrypt the word <strong>"CIPHER"</strong>. In a Merkle Tournament, every single letter is entered as an independent player at the top of the bracket.</p>`,
      action: () => {
        resetTree();
        for(let i=0; i<6; i++) {
          $(`l-${i}`).classList.add('active');
        }
      }
    },
    {
      id: 1,
      title: "2. The Power-of-2 Rule",
      desc: `<p>Wait! "CIPHER" only has 6 letters. A perfect tournament bracket requires exactly <strong>2, 4, 8, or 16</strong> players so no one gets a free pass.</p>
             <p class="mt-2 text-slate-300"><strong>Rule:</strong> We pad the empty slots with 'A' (Index 0) to reach 8 total leaves!</p>`,
      action: () => {
        $(`l-6`).classList.add('active'); $(`l-6`).querySelector('.node-val').classList.remove('opacity-0');
        $(`l-7`).classList.add('active'); $(`l-7`).querySelector('.node-val').classList.remove('opacity-0');
      }
    },
    {
      id: 2,
      title: "3. Convert to Alphabet Indexes",
      desc: `<p>The mathematical fusion engine doesn't understand letters. We convert every player into their Alphabet Index (A=0, B=1... Z=25).</p>
             <p class="mt-2 text-slate-300 font-mono text-xs">C(2), I(8), P(15), H(7), E(4), R(17), A(0), A(0)</p>`,
      action: () => {
        document.querySelectorAll('.idx-lbl').forEach(el => el.classList.remove('hidden', 'opacity-0'));
      }
    },
    {
      id: 3,
      title: "4. Quarter-Finals (Round 1)",
      desc: `<p>The 8 players battle in pairs! They fuse together using the formula <code class="text-cyan-400 font-bold bg-cyan-950 px-1 rounded">h(a,b) = (a×3 + b×7) mod 26</code>.</p>
             <ul class="list-disc ml-5 mt-2 text-xs space-y-1 text-slate-300 font-mono">
               <li>C(2) + I(8) &rarr; (6 + 56) mod 26 = <strong>10 (K)</strong></li>
               <li>P(15) + H(7) &rarr; (45 + 49) mod 26 = <strong>16 (Q)</strong></li>
             </ul>`,
      action: () => {
        for(let i=0; i<8; i++) $(`bx-${i}`).classList.remove('glow-slate', 'glow-orange');
        for(let i=0; i<8; i++) $(`l-${i}`).classList.add('dimmed');
        
        for(let i=0; i<4; i++) {
          $(`bkt-qf-${i}`).classList.add('active-cyan');
          $(`stm-qf-${i}`).classList.add('active-cyan');
          $(`frm-qf-${i}`).classList.add('show');
          $(`qf-${i}`).classList.add('active');
          $(`bx-qf-${i}`).classList.add('glow-cyan');
        }
      }
    },
    {
      id: 4,
      title: "5. Semi-Finals (Round 2)",
      desc: `<p>The 4 winners advance and fuse again!</p>
             <ul class="list-disc ml-5 mt-2 text-xs space-y-1 text-slate-300 font-mono">
               <li>K(10) + Q(16) &rarr; (30 + 112) mod 26 = <strong>12 (M)</strong></li>
               <li>B(1) + A(0) &rarr; (3 + 0) mod 26 = <strong>3 (D)</strong></li>
             </ul>`,
      action: () => {
        for(let i=0; i<4; i++) $(`qf-${i}`).classList.add('dimmed');
        
        for(let i=0; i<2; i++) {
          $(`bkt-sf-${i}`).classList.add('active-purple');
          $(`stm-sf-${i}`).classList.add('active-purple');
          $(`frm-sf-${i}`).classList.add('show');
          $(`sf-${i}`).classList.add('active');
          $(`bx-sf-${i}`).classList.add('glow-purple');
        }
      }
    },
    {
      id: 5,
      title: "6. The Finals (Root Calculation)",
      desc: `<p>The final two blocks, M(12) and D(3), fuse to create the Ultimate Root Hash.</p>
             <p class="mt-2 text-slate-300 font-mono text-sm border-l-2 border-green-500 pl-2">
               (12×3 + 3×7) = 36 + 21 = 57.<br>
               57 mod 26 = <strong class="text-green-400">5</strong> (which is the letter <strong>'F'</strong>!)
             </p>`,
      action: () => {
        for(let i=0; i<2; i++) $(`sf-${i}`).classList.add('dimmed');
        
        $(`bkt-fin`).classList.add('active-green');
        $(`stm-fin`).classList.add('active-green');
        $(`frm-fin`).classList.add('show');
        $(`root`).classList.add('active');
        $(`bx-root`).classList.add('glow-green');
      }
    },
    {
      id: 6,
      title: "7. The Merkle Champion",
      desc: `<p>Success! The entire word <strong>"CIPHER"</strong> has been cryptographically crushed down into a single verifiable fingerprint: <strong class="text-green-400 text-lg">F</strong>.</p>
             <p class="mt-2 text-slate-400 text-xs italic">If a hacker changed even one letter of "CIPHER", this tournament would result in a completely different champion!</p>`,
      action: () => {
        $(`root-label`).classList.remove('opacity-0');
        $(`root-icon`).classList.remove('opacity-0');
        $(`bx-root`).classList.remove('glow-green');
        
        // Final pulse effect
        setTimeout(() => { $(`bx-root`).classList.add('glow-green'); }, 100);
      }
    }
  ];

  let speedMultiplier = 1.0;
let currentStep = 0;
  let isPlaying = true;
  let playInterval;
  const $ = (id) => document.getElementById(id);

  function resetTree() {
    // Reset Leaves
    for(let i=0; i<6; i++) {
      $(`l-${i}`).className = 'tree-node flex justify-center';
      $(`bx-${i}`).className = 'node-box glow-slate w-10 h-12 md:w-16 md:h-16 rounded-xl flex flex-col items-center justify-center';
    }
    // Pads
    for(let i=6; i<8; i++) {
      $(`l-${i}`).className = 'tree-node flex justify-center';
      $(`bx-${i}`).className = 'node-box glow-orange w-10 h-12 md:w-16 md:h-16 rounded-xl flex flex-col items-center justify-center';
      $(`bx-${i}`).querySelector('.node-val').classList.add('opacity-0');
    }
    document.querySelectorAll('.idx-lbl').forEach(el => el.classList.add('hidden', 'opacity-0'));

    // Reset QF
    for(let i=0; i<4; i++) {
      $(`bkt-qf-${i}`).className = 'w-1/2 h-6 md:h-8 border-b-2 border-l-2 border-r-2 border-slate-700 rounded-b-lg bracket-line';
      $(`stm-qf-${i}`).className = 'w-0.5 h-3 md:h-4 bg-slate-700 stem-line relative';
      $(`frm-qf-${i}`).classList.remove('show');
      $(`qf-${i}`).className = 'tree-node flex justify-center';
      $(`bx-qf-${i}`).className = 'node-box bg-slate-800 w-12 h-14 md:w-20 md:h-20 rounded-xl flex flex-col items-center justify-center border border-slate-600';
    }

    // Reset SF
    for(let i=0; i<2; i++) {
      $(`bkt-sf-${i}`).className = 'w-1/2 h-8 md:h-12 border-b-2 border-l-2 border-r-2 border-slate-700 rounded-b-xl bracket-line';
      $(`stm-sf-${i}`).className = 'w-0.5 h-5 md:h-8 bg-slate-700 stem-line relative';
      $(`frm-sf-${i}`).classList.remove('show');
      $(`sf-${i}`).className = 'tree-node flex justify-center';
      $(`bx-sf-${i}`).className = 'node-box bg-slate-800 w-14 h-16 md:w-24 md:h-24 rounded-2xl flex flex-col items-center justify-center border border-slate-600';
    }

    // Reset Final
    $(`bkt-fin`).className = 'w-1/2 h-4 md:h-6 border-b-[3px] border-l-[3px] border-r-[3px] border-slate-700 rounded-b-[1.5rem] bracket-line';
    $(`stm-fin`).className = 'w-[3px] h-3 md:h-4 bg-slate-700 stem-line relative';
    $(`frm-fin`).classList.remove('show');
    $(`root`).className = 'tree-node flex justify-center relative';
    $(`bx-root`).className = 'node-box bg-slate-800 w-14 h-16 md:w-18 md:h-20 rounded-3xl flex flex-col items-center justify-center border-2 border-slate-600 shadow-2xl';
    
    $(`root-label`).classList.add('opacity-0');
    $(`root-icon`).classList.add('opacity-0');
  }

  function renderStep(stepIndex) {
    const step = steps[stepIndex];
    
    $('step-title').textContent = step.title;
    $('step-desc').innerHTML = step.desc;

    resetTree();
    for (let i = 0; i <= stepIndex; i++) {
      if (steps[i].action) {
        steps[i].action();
      }
    }

    // Progress dots
      const dotsContainer = $('progress-dots');
      dotsContainer.innerHTML = '';
      steps.forEach((s, i) => {
        const dot = document.createElement('div');
        dot.className = `w-2 h-2 rounded-full transition-colors duration-300 ${i === stepIndex ? 'bg-cyan-500' : 'bg-slate-700'}`;
        dotsContainer.appendChild(dot);
      });
      const prevBtn = $('prevStep');
      const nextBtn = $('nextStep');
      if (prevBtn) prevBtn.disabled = stepIndex <= 0;
      if (nextBtn) nextBtn.disabled = stepIndex >= steps.length - 1;
    }

  function nextStep() {
    if (currentStep < steps.length - 1) {
      currentStep++;
      renderStep(currentStep);
    }
  }

  function prevStep() {
    if (currentStep > 0) {
      currentStep--;
      renderStep(currentStep);
    }
  }

  function restart() {
    currentStep = 0;
    renderStep(0);
  }

    window.addEventListener('DOMContentLoaded', () => {
      renderStep(0);

      const nextBtn = $('nextStep');
      if (nextBtn) nextBtn.addEventListener('click', nextStep);

      const prevBtn = $('prevStep');
      if (prevBtn) prevBtn.addEventListener('click', prevStep);

      const restartBtn = $('replayBtn');
      if (restartBtn) restartBtn.addEventListener('click', restart);


    });
</script>
</body>
</html>
