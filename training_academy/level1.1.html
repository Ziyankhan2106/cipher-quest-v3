<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherQuest | Level 1.1 | Reverse Cipher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --accent-primary: #59f2ff;
            --accent-warning: #ffdd57;
            --accent-success: #22c55e;
            --accent-purple: #b97fff;
            --text-main: #f4f7ff;
            --text-muted: #94a3b8;
            --surface-panel: rgba(15, 23, 42, 0.78);
            --surface-inset: rgba(2, 6, 23, 0.74);
            --border-subtle: rgba(148, 163, 184, 0.34);
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top, #1b243b 0%, #020617 55%);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glass-panel {
            background: var(--surface-panel);
            border: 1px solid var(--border-subtle);
            border-radius: 18px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.7);
            padding: 2rem;
            width: 100%;
            max-width: 700px;
            position: relative;
        }

        .micro-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: var(--accent-warning);
            margin-bottom: 0.5rem;
        }

        /* Mapping Section */
        .mapping-area {
            position: relative;
            margin: 3rem 0;
            display: flex;
            flex-direction: column;
            gap: 80px;
            /* Space for arrows */
        }

        .row-label {
            position: absolute;
            left: -20px;
            transform: translateX(-100%) translateY(20px);
            font-size: 10px;
            color: var(--accent-primary);
            font-weight: 800;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .char-grid {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .char-box {
            width: 50px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-inset);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            font-size: 22px;
            font-weight: 700;
            position: relative;
            transition: all 0.3s ease;
        }

        .char-box.source {
            opacity: 0.6;
        }

        .char-box.active {
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(89, 242, 255, 0.4);
            opacity: 1;
            transform: scale(1.05);
        }

        /* SVG Arrows Layer */
        #arrowLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .mapping-arrow {
            fill: none;
            stroke: var(--accent-primary);
            stroke-width: 2;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            filter: drop-shadow(0 0 4px var(--accent-primary));
            opacity: 0.6;
        }

        @keyframes drawArrow {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* Robot Feedback */
        .robot-section {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-top: 1rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-subtle);
        }

        .robot-icon {
            font-size: 2.2rem;
            filter: drop-shadow(0 0 8px var(--accent-primary));
        }

        .speech-bubble {
            font-size: 14px;
            color: var(--text-muted);
        }

        .badge {
            font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
            color: var(--accent-warning);
            border: 1px solid rgba(255, 221, 87, 0.5); background: rgba(255, 221, 87, 0.06);
            border-radius: 999px; padding: 4px 10px;
        }
        .live {
            display: flex; align-items: center; gap: 7px;
            font-size: 11px; color: var(--accent-success);
            text-transform: uppercase; letter-spacing: .16em;
        }
        .live::before {
            content: ""; width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent-success); box-shadow: 0 0 10px var(--accent-success);
            animation: livepulse 1.3s ease-in-out infinite;
        }
        @keyframes livepulse { 0%,100%{opacity:1} 50%{opacity:.35} }
        .footer {
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px; padding: 12px 22px;
            background: rgba(2, 6, 23, 0.74);
            border-top: 1px solid rgba(148, 163, 184, 0.34);
            border-radius: 0 0 18px 18px;
            margin: 1.5rem -2rem -2rem -2rem;
        }
        .timer {
            font-size: 10px; color: var(--text-muted);
            letter-spacing: .16em; text-transform: uppercase;
        }
        .btn {
            border: 1px solid rgba(89, 242, 255, 0.4); border-radius: 999px;
            background: rgba(89, 242, 255, 0.06); color: var(--accent-primary);
            padding: 7px 16px; font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: .12em; cursor: pointer;
        }
        .btn:hover { background: rgba(89, 242, 255, 0.12); box-shadow: 0 0 16px rgba(89, 242, 255, 0.25); }
    </style>
    <script src="global_controls.js"></script>
</head>

<body>

    <div class="glass-panel">
        <div class="flex justify-between items-center mb-4">
            <div style="display:flex;align-items:center;gap:10px">
                <span class="badge">CH 01</span>
                <div>
                    <div style="font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.14em">Reverse Cipher</div>
                    <div class="micro-label" style="margin-bottom:0">Visual Logic 1.1</div>
                </div>
            </div>
            <div class="live">Auto Demo</div>
        </div>

        <p class="text-sm text-slate-400 mb-2">
            Observe the <span class="text-cyan-300 font-bold">Original</span> (Top) vs the <span
                class="text-cyan-300 font-bold">Modified</span> (Bottom).
        </p>

        <div class="mapping-area">
            <!-- Arrows will be drawn here -->
            <svg id="arrowLayer"></svg>

            <!-- Original Row -->
            <div class="relative">
                <span class="row-label">INPUT</span>
                <div class="char-grid" id="inputGrid"></div>
            </div>

            <!-- Target Row -->
            <div class="relative">
                <span class="row-label">OUTPUT</span>
                <div class="char-grid" id="outputGrid"></div>
            </div>
        </div>

        <div class="robot-section">
            <div class="robot-icon">🤖</div>
            <div class="speech-bubble">
                <div class="font-bold text-white mb-1 uppercase tracking-widest text-[11px]" id="robotTitle">System Idle
                </div>
                <p id="robotText">Standing by. Initiating index comparison protocol...</p>
            </div>
        </div>

        <footer class="footer">
            <div class="timer" id="timer">Looping demo</div>
                <div class="speed-controls" style="display:flex; align-items:center; gap:8px;">
      <button class="btn" id="speedDown" title="Slower" style="padding:4px 10px;">-</button>
      <span class="timer" id="speedDisplay" style="font-variant-numeric: tabular-nums;">1.0x</span>
      <button class="btn" id="speedUp" title="Faster" style="padding:4px 10px;">+</button>
    </div>
            <button class="btn" id="replay">Replay Now</button>
        </footer>
    </div>

    <script>
let speedMultiplier = 1.0;
        const word = "CIPHER";
        const inputGrid = document.getElementById('inputGrid');
        const outputGrid = document.getElementById('outputGrid');
        const arrowLayer = document.getElementById('arrowLayer');
        const robotTitle = document.getElementById('robotTitle');
        const robotText = document.getElementById('robotText');
        const replayBtn = document.getElementById('replay');

        let isAnimating = false;

        function setRobot(title, text) {
            robotTitle.textContent = title;
            robotText.textContent = text;
        }

        function init() {
            inputGrid.innerHTML = '';
            outputGrid.innerHTML = '';
            arrowLayer.innerHTML = '';

            word.split('').forEach((char, i) => {
                const box = document.createElement('div');
                box.className = 'char-box source';
                box.textContent = char;
                inputGrid.appendChild(box);

                const targetBox = document.createElement('div');
                targetBox.className = 'char-box';
                targetBox.style.opacity = '0.1';
                targetBox.textContent = '?';
                outputGrid.appendChild(targetBox);
            });
        }

        async function startProtocol() {
            if (isAnimating) return;
            isAnimating = true;
            init();

            setRobot("Analyzing Input", "Calculating the mirror axis. For length 6, Index 0 maps to 5.");
            await new Promise(r => setTimeout(r, 1200 / speedMultiplier));

            const inputs = inputGrid.children;
            const outputs = outputGrid.children;
            const n = word.length;

            for (let i = 0; i < n; i++) {
                const sourceBox = inputs[i];
                const targetIdx = (n - 1) - i;
                const targetBox = outputs[targetIdx];

                // Highlight active mapping
                sourceBox.classList.add('active');
                setRobot("Mapping Index " + i, `Transporting '${word[i]}' to position ${targetIdx}.`);

                // Draw Arrow
                const sRect = sourceBox.getBoundingClientRect();
                const tRect = targetBox.getBoundingClientRect();
                const layerRect = arrowLayer.getBoundingClientRect();

                const x1 = (sRect.left + sRect.width / 2) - layerRect.left;
                const y1 = (sRect.bottom) - layerRect.top;
                const x2 = (tRect.left + tRect.width / 2) - layerRect.left;
                const y2 = (tRect.top) - layerRect.top;

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                // Create a Bezier curve for the arrow
                const cp1y = y1 + 40;
                const cp2y = y2 - 40;
                const d = `M ${x1} ${y1} C ${x1} ${cp1y}, ${x2} ${cp2y}, ${x2} ${y2}`;

                path.setAttribute("d", d);
                path.setAttribute("class", "mapping-arrow");
                path.style.animation = "drawArrow 0.8s forwards ease-out";
                arrowLayer.appendChild(path);

                await new Promise(r => setTimeout(r, 400 / speedMultiplier));

                // Populate Target
                targetBox.textContent = word[i];
                targetBox.style.opacity = '1';
                targetBox.classList.add('active');

                await new Promise(r => setTimeout(r, 400 / speedMultiplier));
                sourceBox.classList.remove('active');
                targetBox.classList.remove('active');
            }

            setRobot("Success", "Transformation complete. The original structure is preserved at the top for verification.");
            isAnimating = false;
        }

        replayBtn.addEventListener('click', () => {
            isAnimating = false;
            startProtocol();
        });
        window.onload = () => {
            init();
            setTimeout(startProtocol, 1000 / speedMultiplier);
        };
    
        const sDisplay = document.getElementById("speedDisplay");
  if (document.getElementById("speedUp")) {
    document.getElementById("speedUp").addEventListener("click", () => {
      if (speedMultiplier < 4.0) speedMultiplier += 0.5;
      if (sDisplay) sDisplay.textContent = speedMultiplier.toFixed(1) + "x";
    });
    document.getElementById("speedDown").addEventListener("click", () => {
      if (speedMultiplier > 0.5) speedMultiplier -= 0.5;
      if (sDisplay) sDisplay.textContent = speedMultiplier.toFixed(1) + "x";
    });
  }

  const nextBtn = document.getElementById("nextBtn");
  if (nextBtn) {
    nextBtn.addEventListener("click", () => {
      const match = window.location.pathname.match(/level(\d+)\.(\d+)\.html/);
      if (match) {
        let ch = parseInt(match[1]);
        let lvl = parseInt(match[2]);
        lvl++;
        if (lvl > 5) { lvl = 1; ch++; }
        if (ch <= 4) window.location.href = `level${ch}.${lvl}.html`;
      }
    });
  }
</script>
</body>

</html>
